*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg-void:#080b14;--bg-deep:#0d1220;--bg-surface:#111827;--bg-elevated:#161f33;
  --bg-glass:rgba(255,255,255,0.04);--bg-glass-hover:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--border-bright:rgba(255,255,255,0.15);

  --emerald:#2dd4a0;--emerald-soft:rgba(45,212,160,0.12);
  --rose:#f06577;--rose-soft:rgba(240,101,119,0.12);
  --blue:#6fa3ef;--blue-soft:rgba(111,163,239,0.12);

}

@media(min-width:1024px){

/* AMBIENT */
.amb{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.amb::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(212,168,83,0.06),transparent 70%);top:-100px;right:-100px;animation:drift 20s ease-in-out infinite}
.amb::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(45,212,160,0.04),transparent 70%);bottom:-100px;left:-100px;animation:drift 25s ease-in-out infinite reverse}
@keyframes drift{0%,100%{transform:translate(0,0)}33%{transform:translate(20px,-20px)}66%{transform:translate(-10px,15px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
/* SYNC BAR */
.sync-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg-elevated);border-top:1px solid var(--border);padding:5px 16px;display:none;align-items:center;justify-content:space-between;z-index:200;font-size:.68em;color:var(--text3)}
@media(min-width:768px){.sync-bar{max-width:768px}}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.sdot.local{background:var(--blue)}.sdot.cloud{background:var(--emerald)}.sdot.offline{background:var(--rose)}.sdot.syncing{background:var(--gold);animation:pulse 1s infinite}
/* LICENSE */
#licenseGate{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;position:relative;z-index:10}
.lic-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r4);padding:36px 28px;width:100%;max-width:360px;text-align:center;box-shadow:0 4px 40px rgba(0,0,0,.4);animation:slideUp .5s cubic-bezier(.22,1,.36,1)}
.lic-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--gold),#f0c060);border-radius:var(--r2);margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 30px var(--gold-glow)}
.lic-card h2{font-family:var(--ff);font-size:1.5em;font-weight:700;letter-spacing:-.02em}
.lic-card p{color:var(--text2);font-size:.82em;margin:6px 0 24px;font-weight:300}
.lic-input{width:100%;padding:14px 18px;background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r2);font-size:1.05em;text-align:center;letter-spacing:4px;color:var(--text);outline:none;font-family:var(--fm);transition:all .25s;margin-bottom:12px}
.lic-input:focus{border-color:var(--gold);background:rgba(212,168,83,.06);box-shadow:0 0 0 3px var(--gold-glow)}
.lic-status{font-size:.75em;margin-top:12px;min-height:18px;font-weight:500}
.lic-status.ok{color:var(--emerald)}.lic-status.err{color:var(--rose)}
/* LOGIN */
#loginScreen{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;position:relative;z-index:10}
.log-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r4);padding:28px 22px;width:100%;max-width:360px;box-shadow:0 4px 40px rgba(0,0,0,.4);animation:slideUp .5s cubic-bezier(.22,1,.36,1)}
.log-logo{text-align:center;margin-bottom:24px}
.log-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--gold),#f0c060);border-radius:var(--r2);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 25px var(--gold-glow)}
.log-logo h1{font-family:var(--ff);font-size:1.6em;font-weight:800;letter-spacing:-.03em}
.log-logo p{color:var(--text2);font-size:.78em;font-weight:300;margin-top:3px;letter-spacing:.04em}
.sec-label{font-size:.65em;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;font-weight:600;font-family:var(--ff);margin-bottom:8px}
.usr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:18px;max-height:190px;overflow-y:auto;scrollbar-width:none}
.usr-grid::-webkit-scrollbar{display:none}
.usr-card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r2);padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s}
.usr-card.sel{border-color:var(--gold);background:var(--gold-soft);box-shadow:0 0 20px var(--gold-glow)}
.usr-card .av{font-size:1.6em;display:block}
.usr-card .nm{font-size:.68em;color:var(--text);margin-top:4px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rbadge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:.6em;font-weight:600;font-family:var(--ff);letter-spacing:.04em;margin-top:3px}
.rb-admin{background:rgba(212,168,83,.2);color:var(--gold)}
.rb-manager{background:var(--emerald-soft);color:var(--emerald)}
.rb-cashier{background:var(--blue-soft);color:var(--blue)}
.pin-dots{display:flex;justify-content:center;gap:14px;margin:14px 0 8px}
.pin-dot{width:12px;height:12px;border-radius:50%;background:var(--bg-glass);border:1.5px solid var(--border);transition:all .25s}
.pin-dot.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 12px var(--gold-glow);transform:scale(1.15)}
.pin-dot.err{background:var(--rose);border-color:var(--rose);animation:shake .3s ease}
.lockout-bar{background:rgba(240,101,119,.1);border:1px solid rgba(240,101,119,.3);border-radius:var(--r2);padding:10px 14px;text-align:center;font-size:.78em;color:var(--rose);margin-bottom:8px;font-weight:600;display:none}
.err-msg{color:var(--rose);text-align:center;font-size:.78em;min-height:18px;margin-bottom:8px;font-weight:500}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.pbn{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r2);padding:16px;font-size:1.25em;cursor:pointer;color:var(--text);font-family:var(--ff);font-weight:600;transition:all .15s}
.pbn:active{transform:scale(.94)}
.pbn:hover{border-color:var(--border-bright);background:var(--bg-glass-hover)}
.pbn:disabled{opacity:.3;pointer-events:none}
.pbn.clr{background:var(--rose-soft);color:var(--rose);border-color:rgba(240,101,119,.25);font-size:.8em}
.pbn.sub{background:linear-gradient(135deg,var(--gold),#e8b850);color:#1a0f00;border-color:transparent;font-size:.95em}
/* MAIN */
#mainApp{display:none;position:relative;z-index:10;padding-bottom:36px}
.hdr{background:rgba(13,18,32,.9);backdrop-filter:blur(20px);padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.hdr-logo{font-family:var(--ff);font-size:1.05em;font-weight:700;letter-spacing:-.02em}
.hdr-r{display:flex;align-items:center;gap:8px}
.hbtn{background:var(--rose-soft);color:var(--rose);border:1px solid rgba(240,101,119,.2);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:.75em;font-weight:600;font-family:var(--ff);transition:all .2s}
.hambg{background:var(--bg-glass);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;width:38px;height:38px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center}
.br-chip{background:var(--emerald-soft);color:var(--emerald);padding:5px 11px;border-radius:20px;font-size:.72em;font-weight:600;font-family:var(--ff);border:1px solid rgba(45,212,160,.2)}
.adm-chip{background:var(--gold-soft);color:var(--gold);padding:5px 11px;border-radius:20px;font-size:.72em;font-weight:600;font-family:var(--ff);border:1px solid rgba(212,168,83,.25)}
#mainContent{padding:14px;min-height:60vh}
/* CARDS */
.card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r3);padding:18px;margin:10px 0;backdrop-filter:blur(10px);transition:border-color .2s}
.card:hover{border-color:var(--border-bright)}
.card h4,.card h5{font-family:var(--ff);font-weight:600;letter-spacing:-.01em;margin-bottom:10px}
.card h5{font-size:.88em;color:var(--text2)}
/* BADGES */
.bir-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(212,168,83,.2),rgba(212,168,83,.08));border:1px solid rgba(212,168,83,.35);border-radius:20px;padding:4px 12px;font-size:.68em;font-weight:700;color:var(--gold);font-family:var(--ff);letter-spacing:.06em;text-transform:uppercase}
.fb-on{display:inline-flex;align-items:center;gap:5px;background:rgba(45,212,160,.15);color:var(--emerald);border:1px solid rgba(45,212,160,.3);border-radius:20px;padding:4px 12px;font-size:.68em;font-weight:700;font-family:var(--ff)}
.fb-off{display:inline-flex;align-items:center;gap:5px;background:var(--blue-soft);color:var(--blue);border:1px solid rgba(111,163,239,.25);border-radius:20px;padding:4px 12px;font-size:.68em;font-weight:700;font-family:var(--ff)}
/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.met{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r2);padding:16px;text-align:center;position:relative;overflow:hidden}
.met::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4}
.met-v{font-family:var(--ff);font-size:1.2em;font-weight:700;color:var(--gold);letter-spacing:-.02em}
.met-l{font-size:.66em;color:var(--text3);margin-top:5px;text-transform:uppercase;letter-spacing:.08em;font-weight:500}
/* BUTTONS */
.btn{padding:11px 22px;border:none;border-radius:var(--r2);cursor:pointer;font-size:.83em;font-weight:600;font-family:var(--ff);letter-spacing:.03em;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.4;pointer-events:none}
.bp{background:linear-gradient(135deg,var(--gold),#e8b850);color:#1a0f00;box-shadow:0 4px 15px var(--gold-glow)}
.bp:hover{transform:translateY(-1px)}
.bs{background:var(--emerald-soft);color:var(--emerald);border:1px solid rgba(45,212,160,.25)}
.bd{background:var(--rose-soft);color:var(--rose);border:1px solid rgba(240,101,119,.2)}
.bw{background:rgba(251,189,35,.12);color:#fbb923;border:1px solid rgba(251,189,35,.2)}
.bpu{background:var(--purple-soft);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
.bb{background:var(--blue-soft);color:var(--blue);border:1px solid rgba(111,163,239,.2)}
.bsm{padding:7px 14px;font-size:.72em;border-radius:var(--r1)}
.bxs{padding:4px 10px;font-size:.66em;border-radius:6px}
.bbl{width:100%;margin-bottom:8px}
/* INPUTS */
input[type=text],input[type=number],input[type=tel],input[type=email],input[type=password],input[type=file],select,textarea{width:100%;padding:11px 16px;background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r2);font-size:.87em;color:var(--text);outline:none;font-family:var(--fb);margin-bottom:8px;transition:all .2s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold);background:rgba(212,168,83,.05);box-shadow:0 0 0 3px rgba(212,168,83,.12)}
select{cursor:pointer}select option{background:var(--bg-surface);color:var(--text)}
textarea{resize:vertical;min-height:70px}
.inp-label{font-size:.7em;color:var(--text2);display:block;margin-bottom:4px;font-family:var(--ff);letter-spacing:.04em}
/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.78em}
th{background:var(--bg-elevated);color:var(--text2);padding:10px 12px;text-align:left;font-family:var(--ff);font-size:.7em;text-transform:uppercase;letter-spacing:.08em;font-weight:600;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text2);vertical-align:middle}
tr:hover td{background:var(--bg-glass);color:var(--text)}
.stock-low{color:var(--rose);font-weight:700}
/* SIDEBAR */
.sidebar{position:fixed;left:-300px;top:0;bottom:0;width:270px;background:rgba(13,18,32,.97);backdrop-filter:blur(30px);z-index:1000;transition:left .3s cubic-bezier(.22,1,.36,1);overflow-y:auto;border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar.on{left:0}
.sb-hdr{padding:24px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sb-logo{width:40px;height:40px;background:linear-gradient(135deg,var(--gold),#f0c060);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-hdr-txt h3{font-family:var(--ff);font-size:1.05em;font-weight:700}
.sb-hdr-txt p{color:var(--text3);font-size:.68em;margin-top:2px}
.sb-nav{padding:12px 10px;flex:1}
.sb-sec{font-size:.58em;color:var(--text3);text-transform:uppercase;letter-spacing:.15em;padding:12px 10px 5px;font-weight:700;font-family:var(--ff)}
.sb-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:var(--r2);cursor:pointer;color:var(--text2);font-size:.83em;font-weight:400;transition:all .18s;margin-bottom:2px;position:relative}
.sb-item:hover{background:var(--bg-glass);color:var(--text)}
.sb-item.on{background:var(--gold-soft);color:var(--gold);font-weight:600}
.sb-item.on::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:3px;background:var(--gold);border-radius:0 3px 3px 0}
.sb-icon{font-size:1em;width:22px;text-align:center}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:999}
.sb-ov.on{display:block}
.sb-ft{padding:12px 10px;border-top:1px solid var(--border)}
.sb-ft-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border-radius:var(--r2);cursor:pointer;color:var(--rose);font-size:.82em;font-weight:500;border:none;background:none;font-family:var(--fb);transition:all .2s}
.sb-ft-btn:hover{background:var(--rose-soft)}
/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);z-index:2000;justify-content:center;align-items:center;padding:16px}
.modal.on{display:flex}
.modal-box{background:var(--bg-surface);border:1px solid var(--border-bright);border-radius:var(--r4);padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;box-shadow:0 4px 40px rgba(0,0,0,.5);animation:slideUp .25s cubic-bezier(.22,1,.36,1)}
.modal-box h4{font-family:var(--ff);font-size:1.1em;font-weight:700;letter-spacing:-.02em;margin-bottom:16px}
.modal-box::-webkit-scrollbar{width:3px}.modal-box::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:3px}
/* CONFIRM / ALERT custom dialogs */
.dlg-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:3000;display:flex;justify-content:center;align-items:center;padding:20px;animation:fadeIn .15s ease}
.dlg-box{background:var(--bg-surface);border:1px solid var(--border-bright);border-radius:var(--r3);padding:24px;width:100%;max-width:340px;box-shadow:0 8px 40px rgba(0,0,0,.5);animation:slideUp .2s cubic-bezier(.22,1,.36,1)}
.dlg-icon{font-size:2em;text-align:center;margin-bottom:12px}
.dlg-title{font-family:var(--ff);font-size:1em;font-weight:700;text-align:center;margin-bottom:8px}
.dlg-msg{font-size:.82em;color:var(--text2);text-align:center;margin-bottom:20px;line-height:1.5}
.dlg-input{margin-bottom:16px}
.dlg-btns{display:flex;gap:8px}
.dlg-btns .btn{flex:1}

.toast-wrap{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);z-index:2500;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:90%;max-width:320px}

<script>
// ========== DIALOG SYSTEM ==========
function dlg(opts){ /* same as before */ }
const alert2 = (msg,icon='ℹ️',color='var(--blue)') => dlg({type:'alert',icon,msg,color,okLabel:'OK'});
const confirm2 = (msg,icon='⚠️',danger=false) => dlg({type:'confirm',icon,msg,color:danger?'var(--rose)':'var(--gold)',danger,okLabel:'Confirm',cancelLabel:'Cancel'});
const prompt2 = (msg,placeholder='',defaultVal='',inputType='text') => dlg({type:'prompt',icon:'✏️',msg,placeholder,defaultVal,inputType,okLabel:'Save',cancelLabel:'Cancel',color:'var(--gold)'});

function toast(msg,color='gold',dur=3200){ /* same as before */ }

// ========== STORAGE – LOCAL ==========
const STORES=['products','sales','users','settings','branches','activityLogs','suppliers','purchaseOrders','voidedSales','heldSales','returns','customers'];
const LocalDB={
  init(){STORES.forEach(s=>{if(!localStorage.getItem('mlea_'+s))localStorage.setItem('mlea_'+s,'[]')})},
  getAll(k){try{return JSON.parse(localStorage.getItem('mlea_'+k)||'[]')}catch{return[]}},
  set(k,d){localStorage.setItem('mlea_'+k,JSON.stringify(d))},
  add(k,item){ const items=this.getAll(k); item.id=items.reduce((max,i)=>Math.max(max,i.id||0),0)+1; item.createdAt=new Date().toISOString(); items.push(item); this.set(k,items); return item.id; },
  update(k,item){ const items=this.getAll(k); const idx=items.findIndex(i=>i.id===item.id); if(idx!==-1){item.updatedAt=new Date().toISOString(); items[idx]=item; this.set(k,items); } },
  delete(k,id){ this.set(k,this.getAll(k).filter(i=>i.id!==id)); },
  getById(k,id){ return this.getAll(k).find(i=>i.id===id)||null; },
  getByBranch(k,bid){ return this.getAll(k).filter(i=>i.branchId===bid); }
};
LocalDB.init();

// ========== STORAGE – FIREBASE ==========
let _fb=null;
const FirebaseDB={
  _cache:{},
  async init(config){ /* same as before */ },
  async _load(k){ /* ... */ },
  getAll(k){ return this._cache[k]||[]; },
  set(k,arr){ this._cache[k]=arr; },
  add(k,item){ /* ... */ },
  update(k,item){ /* ... */ },
  delete(k,id){ /* ... */ },
  getById(k,id){ return (this._cache[k]||[]).find(i=>i.id===id)||null; },
  getByBranch(k,bid){ return (this._cache[k]||[]).filter(i=>i.branchId===bid); },
  async _write(col,did,data){ /* ... */ },
  async _del(col,did){ /* ... */ }
};

let offQ=[];
async function flushQ(){ /* ... */ }

// ========== IndexedDB ADAPTER (fixed duplicates) ==========
let _idb = null;
let idbReady = false;
let idbQueue = [];

async function initIDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open('MLEA_POS_DB', 3);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('meta')) db.createObjectStore('meta');
      STORES.forEach(store => {
        if (!db.objectStoreNames.contains(store)) {
          db.createObjectStore(store, { keyPath: 'id' });
        }
      });
    };
    request.onsuccess = (e) => {
      _idb = e.target.result;
      idbReady = true;
      while(idbQueue.length) {
        const {resolve, reject, op, args} = idbQueue.shift();
        IDBOp(op, ...args).then(resolve).catch(reject);
      }
      resolve(true);
    };
    request.onerror = (e) => {
      console.warn('IndexedDB init failed, falling back to localStorage', e);
      idbReady = false;
      resolve(false);
    };
  });
}

function IDBOp(op, store, method, ...args) {
  return new Promise((resolve, reject) => {
    if (!_idb || !idbReady) {
      idbQueue.push({resolve, reject, op, args: [store, method, ...args]});
      return;
    }
    const tx = _idb.transaction(store, method === 'get' || method === 'getAll' ? 'readonly' : 'readwrite');
    const obj = tx.objectStore(store);
    let req;
    if (method === 'getAll') req = obj.getAll();
    else if (method === 'get') req = obj.get(args[0]);
    else if (method === 'put') req = obj.put(args[0]);
    else if (method === 'delete') req = obj.delete(args[0]);
    else if (method === 'clear') req = obj.clear();
    else reject(new Error('Unknown method'));
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
    tx.onerror = () => reject(tx.error);
  });
}

const PrimaryDB = {
  async getAll(store) {
    if (_idb && idbReady) {
      return await IDBOp('get', store, 'getAll') || [];
    }
    try { return JSON.parse(localStorage.getItem('mlea_'+store) || '[]'); } catch { return []; }
  },
  async set(store, items) {
    if (_idb && idbReady) {
      const tx = _idb.transaction(store, 'readwrite');
      const obj = tx.objectStore(store);
      await obj.clear();
      for (let item of items) await obj.put(item);
      await tx.done;
    }
    localStorage.setItem('mlea_'+store, JSON.stringify(items));
  },
  async add(store, item) {
    const items = await this.getAll(store);
    item.id = items.reduce((max,i)=>Math.max(max,i.id||0),0)+1;
    item.createdAt = new Date().toISOString();
    items.push(item);
    await this.set(store, items);
    return item.id;
  },
  async update(store, item) {
    const items = await this.getAll(store);
    const idx = items.findIndex(i=>i.id===item.id);
    if(idx!==-1) {
      item.updatedAt = new Date().toISOString();
      items[idx] = item;
      await this.set(store, items);
    }
  },
  async delete(store, id) {
    const items = (await this.getAll(store)).filter(i=>i.id!==id);
    await this.set(store, items);
  },
  async getById(store, id) {
    return (await this.getAll(store)).find(i=>i.id===id) || null;
  },
  async getByBranch(store, bid) {
    return (await this.getAll(store)).filter(i=>i.branchId===bid);
  }
};

const AsyncDB = {
  async getAll(k){ return await PrimaryDB.getAll(k); },
  async set(k,d){ await PrimaryDB.set(k,d); },
  async add(k,item){ return await PrimaryDB.add(k,item); },
  async update(k,item){ await PrimaryDB.update(k,item); },
  async delete(k,id){ await PrimaryDB.delete(k,id); },
  async getById(k,id){ return await PrimaryDB.getById(k,id); },
  async getByBranch(k,bid){ return await PrimaryDB.getByBranch(k,bid); }
};

// ========== UNIFIED DB (synchronous, for legacy parts) ==========
let storageMode='local';
const DB={
  get _a(){return storageMode==='firebase'?FirebaseDB:LocalDB},
  getAll(k){return this._a.getAll(k)},
  set(k,d){this._a.set(k,d)},
  add(k,item){return this._a.add(k,item)},
  update(k,item){this._a.update(k,item)},
  delete(k,id){this._a.delete(k,id)},
  getById(k,id){return this._a.getById(k,id)},
  getByBranch(k,bid){return this._a.getByBranch(k,bid)}
};

// ========== NETWORK ==========
let isOnline=navigator.onLine;
window.addEventListener('online',()=>{isOnline=true;updateSyncBar();flushQ();});
window.addEventListener('offline',()=>{isOnline=false;updateSyncBar();});
function setSyncStatus(mode,msg){
  const dot=document.getElementById('syncDot'),lbl=document.getElementById('syncLabel'),sm=document.getElementById('syncMsg');

}
function updateSyncBar(){
  const bar=document.getElementById('syncBar');if(!bar)return;bar.style.display='flex';
  if(storageMode==='firebase')setSyncStatus(isOnline?'cloud':'offline',isOnline?'Online':'Offline — queuing changes');
  else setSyncStatus('local','Local only');
}

// ========== SETTINGS HELPERS ==========
function getSetting(k,def=''){return LocalDB.getAll('settings').find(s=>s.key===k)?.value??def}
function saveSetting(k,v){
  const all=LocalDB.getAll('settings'),e=all.find(s=>s.key===k);
  if(e){e.value=v;LocalDB.update('settings',e);}else LocalDB.add('settings',{key:k,value:v});
  if(storageMode==='firebase'){
    const all2=FirebaseDB.getAll('settings'),e2=all2.find(s=>s.key===k);
    if(e2){e2.value=v;FirebaseDB.update('settings',e2);}else FirebaseDB.add('settings',{key:k,value:v});
  }
}

// ========== CURRENCIES ==========
const CURR={
  PHP:{s:'₱',n:'Philippine Peso',f:'🇵🇭',d:2},USD:{s:'$',n:'US Dollar',f:'🇺🇸',d:2},

  AUD:{s:'A$',n:'Australian Dollar',f:'🇦🇺',d:2},CAD:{s:'C$',n:'Canadian Dollar',f:'🇨🇦',d:2},
  INR:{s:'₹',n:'Indian Rupee',f:'🇮🇳',d:2},AED:{s:'د.إ',n:'UAE Dirham',f:'🇦🇪',d:2},
  SAR:{s:'﷼',n:'Saudi Riyal',f:'🇸🇦',d:2},HKD:{s:'HK$',n:'HK Dollar',f:'🇭🇰',d:2},
  VND:{s:'₫',n:'Vietnamese Dong',f:'🇻🇳',d:0},BRL:{s:'R$',n:'Brazilian Real',f:'🇧🇷',d:2},

function computeVAT(total,vatType,rate,items){
  if(vatType!=='vat')return{vatableSales:0,vatAmount:0,vatExempt:total,zeroRated:0,grandTotal:total};
  if(items&&items.length){
    let vatableAmt=0,exemptAmt=0,zeroAmt=0;
    items.forEach(i=>{
      const lineNet=i.price*i.quantity;
      if(i.zeroRated)zeroAmt+=lineNet;
      else if(i.vatExempt)exemptAmt+=lineNet;
      else vatableAmt+=lineNet;
    });
    const vatableSalesNet=vatableAmt/(1+rate);
    const vatAmount=vatableAmt-vatableSalesNet;
    return{vatableSales:vatableSalesNet,vatAmount,vatExempt:exemptAmt,zeroRated:zeroAmt,grandTotal:vatableSalesNet+vatAmount+exemptAmt+zeroAmt};
  }
  const vs=total/(1+rate);return{vatableSales:vs,vatAmount:total-vs,vatExempt:0,zeroRated:0,grandTotal:total};
}

// ========== HASH PIN HELPER ==========
async function hashPIN(pin, saltHex = null) {
  const encoder = new TextEncoder();
  let salt;
  if (saltHex) {
    salt = new Uint8Array(saltHex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
  } else {
    salt = crypto.getRandomValues(new Uint8Array(16));
  }
  const keyMaterial = await crypto.subtle.importKey('raw', encoder.encode(pin), { name: 'PBKDF2' }, false, ['deriveBits']);
  const hashBits = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, keyMaterial, 256);
  const hashArray = Array.from(new Uint8Array(hashBits));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
  const saltHexOut = Array.from(salt).map(b => b.toString(16).padStart(2,'0')).join('');
  return { hash: hashHex, salt: saltHexOut };
}

async function verifyPIN(pin, storedHash, storedSalt) {
  const { hash } = await hashPIN(pin, storedSalt);
  return hash === storedHash;
}

async function getFilteredProds(search = '') {

function quickCash(total) {
  const bills = [20, 50, 100, 200, 500, 1000];
  const seen = new Set();
  const out = [];
  bills.forEach(b => { if (b >= total && out.length < 4 && !seen.has(b)) { seen.add(b); out.push(b); } });
  if (!out.length) { const c = Math.ceil(total / 100) * 100; if (!seen.has(c)) { seen.add(c); out.push(c); } }
  const next = Math.ceil(total / 50) * 50;
  if (!seen.has(next) && out.length < 4) { seen.add(next); out.push(next); }
  return out.sort((a, b) => a - b).slice(0, 4);
}
function updChange(total) {
  const cash = parseFloat(document.getElementById('cashInput')?.value) || 0;
  const cd = document.getElementById('chgDisp'), ca = document.getElementById('chgAmt'), im = document.getElementById('insufMsg');
  if (!cd) return;
  if (cash >= total) { cd.style.display = 'block'; if (ca) ca.textContent = fc(cash - total); if (im) im.style.display = 'none'; }
  else { cd.style.display = 'none'; if (im) im.style.display = 'block'; }
}

  });
}

  const sub = cart.reduce((s, i) => s + (i.price * i.quantity), 0);

  });
}

async function doSplitPay(total) {
  const cash = parseFloat(document.getElementById('splitCash').value) || 0;
  const card = parseFloat(document.getElementById('splitCard').value) || 0;
  if (cash + card < total - 0.01) { toast('Amounts do not cover total', 'rose'); return; }
  closeModal(); await _finalizePay('split', cash, card);
}

async function doPay(method) {
  if (!cart.length) { toast('Cart is empty', 'rose'); return; }
  const bir = await getBIR();
  const subBD = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
  const effDisc = Math.min(discAmt, subBD);
  const sub = subBD - effDisc;
  const discRatio = subBD > 0 ? (sub / subBD) : 1;
  const scaledItems = cart.map(i => ({ ...i, price: i.price * discRatio }));
  const vatD = computeVAT(sub, bir.vatType, taxRate, scaledItems);
  const total = vatD.grandTotal;
  if (method === 'cash') {
    const cashEl = document.getElementById('cashInput');
    const cash = parseFloat(cashEl ? cashEl.value : 0) || 0;
    if (cash <= 0) { toast('Enter cash amount tendered', 'rose'); return; }
    if (cash < total) { toast('Cash (' + fc(cash) + ') is less than total (' + fc(total) + ')', 'rose'); return; }
    await _finalizePay('cash', cash, cash - total);
  } else {
    await _finalizePay(method, total, 0);
  }
}

const _finalizePay = async function(method, cashTendered, secondAmt) {
  if (!cart.length) { toast('Cart is empty', 'rose'); return; }
  const bir = await getBIR();
  const subBD = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
  const effDisc = Math.min(discAmt, subBD);
  const sub = subBD - effDisc;
  const discRatio = subBD > 0 ? (sub / subBD) : 1;
  const scaledItems = cart.map(i => ({ ...i, price: i.price * discRatio }));
  const vatD = computeVAT(sub, bir.vatType, taxRate, scaledItems);
  const total = vatD.grandTotal;
  let changeGiven = 0, splitCard = 0, actualCash = cashTendered;
  if (method === 'split') { splitCard = secondAmt; changeGiven = Math.max(0, cashTendered + splitCard - total); }
  else if (method === 'cash') { changeGiven = secondAmt; }
  else { actualCash = 0; changeGiven = 0; }

  const orNum = await getORNumber();
  const branchObj = currentUser.branchId ? await AsyncDB.getById('branches', currentUser.branchId) : null;
  const gat = updateGAT(total);
  const sale = {
    date: new Date().toISOString().split('T')[0],
    timestamp: new Date().toISOString(),
    total, subtotal: sub, subtotalBeforeDiscount: subBD,
    discountAmount: effDisc, discountType: discType,
    tax: vatD.vatAmount, vatableSales: vatD.vatableSales,
    vatExemptSales: vatD.vatExempt, zeroRatedSales: vatD.zeroRated,
    paymentMethod: method, cashTendered: actualCash, changeGiven, splitCard,
    cashierId: currentUser.id, cashierName: currentUser.name,
    branchId: currentUser.branchId, branchName: branchObj ? branchObj.name : 'HQ',
    currency: cur, orNumber: orNum, vatType: bir.vatType, docType: bir.docType,
    grandAccumulatedTotal: gat, voided: false,
    customerId: activeCustomer ? activeCustomer.id : null,
    customerName: activeCustomer ? activeCustomer.name : null,
    items: cart.map(i => ({
      productId: i.id, name: i.name, quantity: i.quantity,
      price: i.price, cost: i.cost || 0, unit: i.unit || 'pcs',
      vatExempt: i.vatExempt || false, zeroRated: i.zeroRated || false
    }))
  };

  const saleId = await AsyncDB.add('sales', sale);
  for (const item of cart) {
    const p = await AsyncDB.getById('products', item.id);
    if (p) { p.stock -= item.quantity; await AsyncDB.update('products', p); }
  }
  await logAct('Sale', orNum + ': ' + fc(total));
  lastSale = { ...sale, id: saleId };
  discAmt = 0; discType = 'none';

  if (activeCustomer) {
    const pts = await awardLoyaltyPoints(activeCustomer.id, total);
    if (pts) setTimeout(() => toast(`⭐ ${pts} loyalty points awarded to ${activeCustomer.name}`, 'purple'), 1200);
  }
  activeCustomer = null;

  showSaleComplete(saleId, total, method, orNum, actualCash, changeGiven, splitCard);
  cart = [];
};

// ========== VOID SALE ==========
async function voidSale(id) {
  const sale = await AsyncDB.getById('sales', id);
  if (!sale) { toast('Sale not found', 'rose'); return; }
  if (sale.voided) { toast('Already voided', 'rose'); return; }
  const reason = await prompt2('Reason for void (required for BIR):', 'e.g. Wrong item entered');
  if (!reason || !reason.trim()) { toast('Void reason is required', 'rose'); return; }
  const ok = await confirm2(`Void ${sale.orNumber || '#' + id} for ${fc(sale.total)}?\nThis is permanent and logged for BIR audit.`, '🚫', true);
  if (!ok) return;
  for (const item of (sale.items || [])) {
    const p = await AsyncDB.getById('products', item.productId);
    if (p) { p.stock += item.quantity; await AsyncDB.update('products', p); }
  }
  sale.voided = true; sale.voidReason = reason; sale.voidedBy = currentUser.name; sale.voidedAt = new Date().toISOString();
  await AsyncDB.update('sales', sale);
  const allSettings = await AsyncDB.getAll('settings');
  const e = allSettings.find(s => s.key === 'bir_gat');
  if (e) { e.value = Math.max(0, parseFloat(e.value) - sale.total).toFixed(2); await AsyncDB.update('settings', e); }
  await AsyncDB.add('voidedSales', { originalSaleId: id, orNumber: sale.orNumber, amount: sale.total, reason, voidedBy: currentUser.name, timestamp: new Date().toISOString() });
  await logAct('VOID', `${sale.orNumber || '#' + id}: ${fc(sale.total)} — ${reason}`);
  toast('Transaction voided and logged ✓', 'emerald');
  sw(currentView);
}

async function bootFirebase() {
  let savedConfig = '', savedMode = 'local';
  try {
    const dbSettings = LocalDB.getAll('settings');
    const cfgE = dbSettings.find(s => s.key === 'firebase_config');
    const modeE = dbSettings.find(s => s.key === 'storageMode');
    if (cfgE) savedConfig = cfgE.value;
    if (modeE) savedMode = modeE.value;
  } catch { }
  if (savedMode === 'firebase' && savedConfig && savedConfig.trim().startsWith('{')) {
    try {
      const cfg = JSON.parse(savedConfig);
      if (!cfg.apiKey || !cfg.projectId) throw new Error('Missing apiKey or projectId');

      if (ok) { storageMode = 'firebase'; }
      else { storageMode = 'local'; setSyncStatus('offline', 'Firebase unavailable — using local'); }

      storageMode = 'local';
      console.warn('Firebase boot error:', e.message);
      setSyncStatus('local', 'Firebase config error — using local');
    }
  }
  updateSyncBar();
}

let _fbAuth = null, _authUser = null;
async function initFBAuth(app) {
  try {
    const authMod = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    _fbAuth = { ...authMod, auth: authMod.getAuth(app) };
    _fbAuth.onAuthStateChanged(_fbAuth.auth, user => { _authUser = user; updateAuthBadge(); });
    return true;
  } catch (e) { console.warn('Firebase Auth init failed:', e); return false; }

async function fbSignIn(email, password) {
  if (!_fbAuth) return { ok: false, error: 'Firebase Auth not initialised' };

    _authUser = cred.user;
    return { ok: true };
  } catch (e) {
    const msg = e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found' ? 'Incorrect email or password' : e.code === 'auth/too-many-requests' ? 'Too many attempts — try again later' : e.message;
    return { ok: false, error: msg };
  }
}
async function fbSignOut() { if (_fbAuth) await _fbAuth.signOut(_fbAuth.auth); _authUser = null; }

async function checkStorageQuota() {
  let used = 0, quota = 0, pct = 0;
  try {
    if (navigator.storage && navigator.storage.estimate) {
      const est = await navigator.storage.estimate();
      used = est.usage || 0; quota = est.quota || 1;
      pct = Math.round((used / quota) * 100);
    } else {
      const raw = JSON.stringify(localStorage).length;
      used = raw; quota = 5 * 1024 * 1024;
      pct = Math.round((raw / quota) * 100);
    }
  } catch (e) { return null; }
  if (pct >= 90) toast(`🚨 Storage critically full (${pct}%)! Export a backup immediately.`, 'rose', 10000);
  else if (pct >= 70) toast(`⚠️ Storage ${pct}% full. Consider downloading a backup.`, 'gold', 6000);
  return { used, quota, pct };
}
function renderStorageQuota(containerId) {
  checkStorageQuota().then(info => {
    const el = document.getElementById(containerId);
    if (!el || !info) return;
    const { used, quota, pct } = info;
    const cls = pct >= 90 ? 'qcrit' : pct >= 70 ? 'qwarn' : 'qok';
    const usedMB = (used / 1024 / 1024).toFixed(2);
    const quotaMB = (quota / 1024 / 1024).toFixed(0);
    el.innerHTML = `
      <div style="display:flex;justify-content:space-between;font-size:.75em;margin-bottom:4px">
        <span style="color:var(--text2)">Storage Used</span>
        <span style="color:${pct >= 90 ? 'var(--rose)' : pct >= 70 ? '#fbb923' : 'var(--emerald)'}"><strong>${pct}%</strong> (${usedMB} MB of ${quotaMB} MB)</span>
      </div>
      <div class="quota-wrap"><div class="quota-bar ${cls}" style="width:${Math.min(pct, 100)}%"></div></div>
      ${pct >= 70 ? `<p style="font-size:.72em;color:${pct >= 90 ? 'var(--rose)' : '#fbb923'};margin-top:4px">${pct >= 90 ? '🚨 Critical — export backup NOW' : '⚠️ Getting full — download a backup soon'}</p>` : ''}`;
  });
}

let _crashCartBackup = null;
window.addEventListener('error', e => {
  console.error('Global error:', e.error);
  if (cart && cart.length) { try { localStorage.setItem('mlea_crash_cart', JSON.stringify(cart)); _crashCartBackup = cart; } catch { } }
  showErrorScreen(e.message || 'An unexpected error occurred', e.filename, e.lineno);
});
window.addEventListener('unhandledrejection', e => {
  console.error('Unhandled promise rejection:', e.reason);
  if (e.reason?.message?.includes('Firebase') || e.reason?.message?.includes('network')) { toast('Network error — working offline', 'gold'); return; }
  if (cart && cart.length) { try { localStorage.setItem('mlea_crash_cart', JSON.stringify(cart)); } catch { } }
});
function showErrorScreen(msg, file, line) {
  if (msg && (msg.includes('ResizeObserver') || msg.includes('Script error'))) return;
  if (document.getElementById('errScreen')) return;
  const div = document.createElement('div');
  div.id = 'errScreen'; div.className = 'err-screen';
  const hasCart = _crashCartBackup && _crashCartBackup.length > 0;
  div.innerHTML = `
    <div style="font-size:3em">⚠️</div>
    <h2>Something went wrong</h2>
    <p>${msg || 'An unexpected error occurred. Your data is safe.'}</p>
    ${hasCart ? `<div class="card" style="background:rgba(45,212,160,.08);border-color:rgba(45,212,160,.3);text-align:left;padding:12px 16px;max-width:300px">
      <p style="font-size:.78em;color:var(--emerald);font-weight:600;margin-bottom:6px">🛒 Your cart was saved</p>
      <p style="font-size:.75em;color:var(--text2)">${_crashCartBackup.length} items preserved. They will be restored when you reload.</p>
    </div>` : ''}
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn bs" onclick="location.reload()">🔄 Reload App</button>
      <button class="btn bw" onclick="downloadBackup();document.getElementById('errScreen').remove()">💾 Download Backup First</button>
      <button class="btn bd" onclick="document.getElementById('errScreen').remove()">Dismiss</button>
    </div>
    ${file ? `<p style="font-size:.65em;color:var(--text3);margin-top:8px">Error in ${file}:${line}</p>` : ''}`;
  document.body.appendChild(div);
}
function restoreCrashCart() {
  try {
    const saved = localStorage.getItem('mlea_crash_cart');
    if (saved) {
      const items = JSON.parse(saved);
      if (items && items.length) { cart = items; localStorage.removeItem('mlea_crash_cart'); setTimeout(() => toast(`🛒 Restored ${items.length} cart items from before the crash`, 'gold', 5000), 2000); }
    }
  } catch { }
}

    points: id ? (await AsyncDB.getById('customers', id))?.points || 0 : 0,
  };
  if (id && id !== 'null') {
    const c = await AsyncDB.getById('customers', parseInt(id));
    if (c) { Object.assign(c, data); await AsyncDB.update('customers', c); }
  } else { await AsyncDB.add('customers', data); }
  closeModal(); sw('customers'); toast('Customer saved ✓', 'emerald');
}
async function deleteCustomer(id) {
  const ok = await confirm2('Delete this customer record?', '👤', true);
  if (ok) { await AsyncDB.delete('customers', id); sw('customers'); }
}
async function selectCustomerForSale() {
  const customers = await AsyncDB.getAll('customers');
  openModal(`<h4>👤 Select Customer</h4>
    <div class="pos-search" style="margin-bottom:10px"><input type="text" id="custSrch" placeholder="Search by name or phone…" oninput="filterCustomerList()"></div>
    <div id="custList" style="max-height:300px;overflow-y:auto">
      ${customers.map(c => `<div class="card" style="cursor:pointer;margin:6px 0;padding:12px" onclick="attachCustomer(${c.id})">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><strong style="font-family:var(--ff)">${c.name}</strong>${c.phone ? `<span style="font-size:.75em;color:var(--text2);margin-left:8px">${c.phone}</span>` : ''}
          <div style="margin-top:4px"><span class="loyalty-pts">⭐ ${c.points || 0} pts</span>${c.scPwd ? ' <span class="rbadge rb-admin" style="font-size:.6em">SC/PWD</span>' : ''}</div>
          </div>
          <span style="color:var(--gold);font-size:1.2em">→</span>
        </div>
      </div>`).join('') || '<div class="empty-st" style="padding:20px"><div class="ei">👤</div><p>No customers</p></div>'}
    </div>
    ${activeCustomer ? `<button class="btn bd bbl" onclick="attachCustomer(null)" style="margin-top:8px">✕ Remove Customer</button>` : ''}
    <button class="btn bw bbl" onclick="closeModal();showCustomerModal()" style="margin-top:0">+ Add New Customer</button>
    <button class="btn bd bbl" onclick="closeModal()" style="margin-top:0">Cancel</button>`);
}
async function filterCustomerList() {
  const q = document.getElementById('custSrch')?.value?.toLowerCase() || '';
  const customers = (await AsyncDB.getAll('customers')).filter(c => !q || c.name.toLowerCase().includes(q) || (c.phone || '').includes(q));
  const list = document.getElementById('custList');
  if (!list) return;
  list.innerHTML = customers.map(c => `<div class="card" style="cursor:pointer;margin:6px 0;padding:12px" onclick="attachCustomer(${c.id})">
    <strong style="font-family:var(--ff)">${c.name}</strong>${c.phone ? `<span style="font-size:.75em;color:var(--text2);margin-left:8px">${c.phone}</span>` : ''}
    <div style="margin-top:4px"><span class="loyalty-pts">⭐ ${c.points || 0} pts</span>${c.scPwd ? ' <span class="rbadge rb-admin" style="font-size:.6em">SC/PWD</span>' : ''}</div>
  </div>`).join('') || '<p style="text-align:center;color:var(--text3);padding:16px;font-size:.82em">No customers found</p>';
}
async function attachCustomer(id) {
  closeModal();
  if (!id) { activeCustomer = null; renderPOS(document.getElementById('mainContent')); return; }
  activeCustomer = await AsyncDB.getById('customers', id);
  if (activeCustomer?.scPwd && discType === 'none') {
    const sub = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
    discType = 'sc'; discAmt = sub * 0.20;
    toast(`👴 SC/PWD discount applied for ${activeCustomer.name}`, 'gold');
  }
  renderPOS(document.getElementById('mainContent'));
}
async function awardLoyaltyPoints(customerId, saleTotal) {
  if (!customerId) return;
  const pts = Math.floor(saleTotal);
  const c = await AsyncDB.getById('customers', customerId);
  if (c) { c.points = (c.points || 0) + pts; await AsyncDB.update('customers', c); }
  return pts;
}

// ========== BARCODE GENERATION ==========
async function loadBwipJS() {
  if (window.bwipjs) return true;
  return new Promise(resolve => { const s = document.createElement('script'); s.src = 'https://cdn.jsdelivr.net/npm/bwip-js@3/dist/bwip-js-min.js'; s.onload = () => resolve(true); s.onerror = () => resolve(false); document.head.appendChild(s); });
}
async function generateBarcodeDataURL(text, type = 'code128') {
  const loaded = await loadBwipJS();
  if (!loaded) return '';
  try { const canvas = document.createElement('canvas'); bwipjs.toCanvas(canvas, { bcid: type, text: String(text), scale: 2, height: 8, includetext: false }); return canvas.toDataURL('image/png'); } catch (e) { return ''; }
}

// ========== EMAIL RECEIPT ==========
async function sendEmailReceipt(sale, email) {
  const svcId = await getSetting('emailjs_service', '');
  const tplId = await getSetting('emailjs_template', '');
  const pubKey = await getSetting('emailjs_pubkey', '');
  if (!svcId || !tplId || !pubKey) { toast('Email not configured. Set up EmailJS in Settings.', 'rose', 5000); return false; }
  if (!window.emailjs) { await new Promise(resolve => { const s = document.createElement('script'); s.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js'; s.onload = resolve; document.head.appendChild(s); }); emailjs.init(pubKey); }
  const bir = await getBIR();
  try {
    await emailjs.send(svcId, tplId, {
      to_email: email, to_name: activeCustomer?.name || 'Valued Customer',
      store_name: bir.name, store_address: bir.address, store_tin: bir.tin,
      or_number: sale.orNumber || '#' + sale.id, sale_date: sale.date,
      cashier: sale.cashierName, total: fc(sale.total), payment_method: sale.paymentMethod.toUpperCase(),
      items_list: (sale.items || []).map(i => `${i.name} x${i.quantity} @ ${fc(i.price)} = ${fc(i.price * i.quantity)}`).join('\n'),
    });
    toast('Receipt emailed to ' + email + ' ✓', 'emerald'); return true;
  } catch (e) { toast('Email failed: ' + (e.text || e.message), 'rose'); return false; }
}
async function promptEmailReceipt(sale) {
  const defaultEmail = activeCustomer?.email || '';
  const email = await prompt2('Send receipt to email:', 'customer@email.com', defaultEmail, 'email');
  if (!email) return;
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('Invalid email address', 'rose'); return; }
  await sendEmailReceipt(sale, email);
}

// ========== PATCHES (customer chip, email button) ==========
const _origRenderPOS = renderPOS;
renderPOS = function (el) {
  _origRenderPOS(el);
  const scanHint = el.querySelector('.scan-hint');
  if (scanHint) {
    const custDiv = document.createElement('div');
    custDiv.style.cssText = 'display:flex;align-items:center;gap:8px;margin:6px 0 10px';
    custDiv.innerHTML = activeCustomer
      ? `<span class="cust-chip" onclick="selectCustomerForSale()">👤 ${activeCustomer.name}${activeCustomer.points ? ' · ⭐' + activeCustomer.points + 'pts' : ''}</span><button class="btn bd bxs" onclick="attachCustomer(null)">✕</button>`
      : `<button class="btn bb bxs" onclick="selectCustomerForSale()">👤 Add Customer</button>`;
    scanHint.after(custDiv);
  }
};
const _origShowSaleComplete = showSaleComplete;
showSaleComplete = function (saleId, total, method, orNum, cashTendered, changeGiven, splitCard) {
  _origShowSaleComplete(saleId, total, method, orNum, cashTendered, changeGiven, splitCard);
  setTimeout(() => {
    const modalBox = document.getElementById('modalBox');
    if (!modalBox || !lastSale) return;
    const printGrid = modalBox.querySelector('.print-grid');
    if (printGrid && (activeCustomer?.email || true)) {
      const emailBtn = document.createElement('button');
      emailBtn.className = 'btn bb bbl';
      emailBtn.style.marginTop = '4px';
      emailBtn.innerHTML = '📧 Email Receipt';
      emailBtn.onclick = () => promptEmailReceipt(lastSale);
      printGrid.after(emailBtn);
    }
  }, 100);
};

// ========== PATCH FirebaseDB.init ==========
const _origFBInit = FirebaseDB.init.bind(FirebaseDB);
FirebaseDB.init = async function (config) {
  const result = await _origFBInit(config);
  if (result && _fb) { await initFBAuth(_fb.db.app); await initFBFunctions(_fb.db.app); if (!_authUser && storageMode === 'firebase') setTimeout(showAuthGate, 500); }
  return result;
};

// ========== FINAL INIT ==========
const _baseInit = initApp;
initApp = async function () {
  await _baseInit();
  await bootFirebase();
  updateSyncBar();
};
showLicGate();
</script>
