<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MLEA POS Pro v6</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#d4a853">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<!-- Phase 3: IndexedDB storage indicator -->
<meta name="storage" content="indexeddb,localstorage">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg-void:#080b14;--bg-deep:#0d1220;--bg-surface:#111827;--bg-elevated:#161f33;
  --bg-glass:rgba(255,255,255,0.04);--bg-glass-hover:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--border-bright:rgba(255,255,255,0.15);
  --gold:#d4a853;--gold-soft:rgba(212,168,83,0.15);--gold-glow:rgba(212,168,83,0.35);
  --emerald:#2dd4a0;--emerald-soft:rgba(45,212,160,0.12);
  --rose:#f06577;--rose-soft:rgba(240,101,119,0.12);
  --blue:#6fa3ef;--blue-soft:rgba(111,163,239,0.12);
  --purple:#a78bfa;--purple-soft:rgba(167,139,250,0.12);
  --text:#f0f0f5;--text2:#8892a4;--text3:#4a5568;
  --ff:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
  --r1:8px;--r2:14px;--r3:20px;--r4:28px;
}
body{font-family:var(--fb);background:var(--bg-void);color:var(--text);overflow-x:hidden;min-height:100vh}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg-deep);position:relative;overflow-x:hidden}
@media(min-width:768px){.wrap{max-width:768px}}
/* AMBIENT */
.amb{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.amb::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(212,168,83,0.06),transparent 70%);top:-100px;right:-100px;animation:drift 20s ease-in-out infinite}
.amb::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(45,212,160,0.04),transparent 70%);bottom:-100px;left:-100px;animation:drift 25s ease-in-out infinite reverse}
@keyframes drift{0%,100%{transform:translate(0,0)}33%{transform:translate(20px,-20px)}66%{transform:translate(-10px,15px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
/* SYNC BAR */
.sync-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg-elevated);border-top:1px solid var(--border);padding:5px 16px;display:none;align-items:center;justify-content:space-between;z-index:200;font-size:.68em;color:var(--text3)}
@media(min-width:768px){.sync-bar{max-width:768px}}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.sdot.local{background:var(--blue)}.sdot.cloud{background:var(--emerald)}.sdot.offline{background:var(--rose)}.sdot.syncing{background:var(--gold);animation:pulse 1s infinite}
/* LICENSE */
#licenseGate{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;position:relative;z-index:10}
.lic-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r4);padding:36px 28px;width:100%;max-width:360px;text-align:center;box-shadow:0 4px 40px rgba(0,0,0,.4);animation:slideUp .5s cubic-bezier(.22,1,.36,1)}
.lic-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--gold),#f0c060);border-radius:var(--r2);margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 30px var(--gold-glow)}
.lic-card h2{font-family:var(--ff);font-size:1.5em;font-weight:700;letter-spacing:-.02em}
.lic-card p{color:var(--text2);font-size:.82em;margin:6px 0 24px;font-weight:300}
.lic-input{width:100%;padding:14px 18px;background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r2);font-size:1.05em;text-align:center;letter-spacing:4px;color:var(--text);outline:none;font-family:var(--fm);transition:all .25s;margin-bottom:12px}
.lic-input:focus{border-color:var(--gold);background:rgba(212,168,83,.06);box-shadow:0 0 0 3px var(--gold-glow)}
.lic-status{font-size:.75em;margin-top:12px;min-height:18px;font-weight:500}
.lic-status.ok{color:var(--emerald)}.lic-status.err{color:var(--rose)}
/* LOGIN */
#loginScreen{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;position:relative;z-index:10}
.log-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r4);padding:28px 22px;width:100%;max-width:360px;box-shadow:0 4px 40px rgba(0,0,0,.4);animation:slideUp .5s cubic-bezier(.22,1,.36,1)}
.log-logo{text-align:center;margin-bottom:24px}
.log-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--gold),#f0c060);border-radius:var(--r2);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 25px var(--gold-glow)}
.log-logo h1{font-family:var(--ff);font-size:1.6em;font-weight:800;letter-spacing:-.03em}
.log-logo p{color:var(--text2);font-size:.78em;font-weight:300;margin-top:3px;letter-spacing:.04em}
.sec-label{font-size:.65em;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;font-weight:600;font-family:var(--ff);margin-bottom:8px}
.usr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:18px;max-height:190px;overflow-y:auto;scrollbar-width:none}
.usr-grid::-webkit-scrollbar{display:none}
.usr-card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r2);padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s}
.usr-card.sel{border-color:var(--gold);background:var(--gold-soft);box-shadow:0 0 20px var(--gold-glow)}
.usr-card .av{font-size:1.6em;display:block}
.usr-card .nm{font-size:.68em;color:var(--text);margin-top:4px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rbadge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:.6em;font-weight:600;font-family:var(--ff);letter-spacing:.04em;margin-top:3px}
.rb-admin{background:rgba(212,168,83,.2);color:var(--gold)}
.rb-manager{background:var(--emerald-soft);color:var(--emerald)}
.rb-cashier{background:var(--blue-soft);color:var(--blue)}
.pin-dots{display:flex;justify-content:center;gap:14px;margin:14px 0 8px}
.pin-dot{width:12px;height:12px;border-radius:50%;background:var(--bg-glass);border:1.5px solid var(--border);transition:all .25s}
.pin-dot.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 12px var(--gold-glow);transform:scale(1.15)}
.pin-dot.err{background:var(--rose);border-color:var(--rose);animation:shake .3s ease}
.lockout-bar{background:rgba(240,101,119,.1);border:1px solid rgba(240,101,119,.3);border-radius:var(--r2);padding:10px 14px;text-align:center;font-size:.78em;color:var(--rose);margin-bottom:8px;font-weight:600;display:none}
.err-msg{color:var(--rose);text-align:center;font-size:.78em;min-height:18px;margin-bottom:8px;font-weight:500}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.pbn{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r2);padding:16px;font-size:1.25em;cursor:pointer;color:var(--text);font-family:var(--ff);font-weight:600;transition:all .15s}
.pbn:active{transform:scale(.94)}
.pbn:hover{border-color:var(--border-bright);background:var(--bg-glass-hover)}
.pbn:disabled{opacity:.3;pointer-events:none}
.pbn.clr{background:var(--rose-soft);color:var(--rose);border-color:rgba(240,101,119,.25);font-size:.8em}
.pbn.sub{background:linear-gradient(135deg,var(--gold),#e8b850);color:#1a0f00;border-color:transparent;font-size:.95em}
/* MAIN */
#mainApp{display:none;position:relative;z-index:10;padding-bottom:36px}
.hdr{background:rgba(13,18,32,.9);backdrop-filter:blur(20px);padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.hdr-logo{font-family:var(--ff);font-size:1.05em;font-weight:700;letter-spacing:-.02em}
.hdr-r{display:flex;align-items:center;gap:8px}
.hbtn{background:var(--rose-soft);color:var(--rose);border:1px solid rgba(240,101,119,.2);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:.75em;font-weight:600;font-family:var(--ff);transition:all .2s}
.hambg{background:var(--bg-glass);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;width:38px;height:38px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center}
.br-chip{background:var(--emerald-soft);color:var(--emerald);padding:5px 11px;border-radius:20px;font-size:.72em;font-weight:600;font-family:var(--ff);border:1px solid rgba(45,212,160,.2)}
.adm-chip{background:var(--gold-soft);color:var(--gold);padding:5px 11px;border-radius:20px;font-size:.72em;font-weight:600;font-family:var(--ff);border:1px solid rgba(212,168,83,.25)}
#mainContent{padding:14px;min-height:60vh}
/* CARDS */
.card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r3);padding:18px;margin:10px 0;backdrop-filter:blur(10px);transition:border-color .2s}
.card:hover{border-color:var(--border-bright)}
.card h4,.card h5{font-family:var(--ff);font-weight:600;letter-spacing:-.01em;margin-bottom:10px}
.card h5{font-size:.88em;color:var(--text2)}
/* BADGES */
.bir-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(212,168,83,.2),rgba(212,168,83,.08));border:1px solid rgba(212,168,83,.35);border-radius:20px;padding:4px 12px;font-size:.68em;font-weight:700;color:var(--gold);font-family:var(--ff);letter-spacing:.06em;text-transform:uppercase}
.fb-on{display:inline-flex;align-items:center;gap:5px;background:rgba(45,212,160,.15);color:var(--emerald);border:1px solid rgba(45,212,160,.3);border-radius:20px;padding:4px 12px;font-size:.68em;font-weight:700;font-family:var(--ff)}
.fb-off{display:inline-flex;align-items:center;gap:5px;background:var(--blue-soft);color:var(--blue);border:1px solid rgba(111,163,239,.25);border-radius:20px;padding:4px 12px;font-size:.68em;font-weight:700;font-family:var(--ff)}
/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.met{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r2);padding:16px;text-align:center;position:relative;overflow:hidden}
.met::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4}
.met-v{font-family:var(--ff);font-size:1.2em;font-weight:700;color:var(--gold);letter-spacing:-.02em}
.met-l{font-size:.66em;color:var(--text3);margin-top:5px;text-transform:uppercase;letter-spacing:.08em;font-weight:500}
/* BUTTONS */
.btn{padding:11px 22px;border:none;border-radius:var(--r2);cursor:pointer;font-size:.83em;font-weight:600;font-family:var(--ff);letter-spacing:.03em;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.4;pointer-events:none}
.bp{background:linear-gradient(135deg,var(--gold),#e8b850);color:#1a0f00;box-shadow:0 4px 15px var(--gold-glow)}
.bp:hover{transform:translateY(-1px)}
.bs{background:var(--emerald-soft);color:var(--emerald);border:1px solid rgba(45,212,160,.25)}
.bd{background:var(--rose-soft);color:var(--rose);border:1px solid rgba(240,101,119,.2)}
.bw{background:rgba(251,189,35,.12);color:#fbb923;border:1px solid rgba(251,189,35,.2)}
.bpu{background:var(--purple-soft);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
.bb{background:var(--blue-soft);color:var(--blue);border:1px solid rgba(111,163,239,.2)}
.bsm{padding:7px 14px;font-size:.72em;border-radius:var(--r1)}
.bxs{padding:4px 10px;font-size:.66em;border-radius:6px}
.bbl{width:100%;margin-bottom:8px}
/* INPUTS */
input[type=text],input[type=number],input[type=tel],input[type=email],input[type=password],input[type=file],select,textarea{width:100%;padding:11px 16px;background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r2);font-size:.87em;color:var(--text);outline:none;font-family:var(--fb);margin-bottom:8px;transition:all .2s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold);background:rgba(212,168,83,.05);box-shadow:0 0 0 3px rgba(212,168,83,.12)}
select{cursor:pointer}select option{background:var(--bg-surface);color:var(--text)}
textarea{resize:vertical;min-height:70px}
.inp-label{font-size:.7em;color:var(--text2);display:block;margin-bottom:4px;font-family:var(--ff);letter-spacing:.04em}
/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.78em}
th{background:var(--bg-elevated);color:var(--text2);padding:10px 12px;text-align:left;font-family:var(--ff);font-size:.7em;text-transform:uppercase;letter-spacing:.08em;font-weight:600;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text2);vertical-align:middle}
tr:hover td{background:var(--bg-glass);color:var(--text)}
.stock-low{color:var(--rose);font-weight:700}
/* SIDEBAR */
.sidebar{position:fixed;left:-300px;top:0;bottom:0;width:270px;background:rgba(13,18,32,.97);backdrop-filter:blur(30px);z-index:1000;transition:left .3s cubic-bezier(.22,1,.36,1);overflow-y:auto;border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar.on{left:0}
.sb-hdr{padding:24px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sb-logo{width:40px;height:40px;background:linear-gradient(135deg,var(--gold),#f0c060);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-hdr-txt h3{font-family:var(--ff);font-size:1.05em;font-weight:700}
.sb-hdr-txt p{color:var(--text3);font-size:.68em;margin-top:2px}
.sb-nav{padding:12px 10px;flex:1}
.sb-sec{font-size:.58em;color:var(--text3);text-transform:uppercase;letter-spacing:.15em;padding:12px 10px 5px;font-weight:700;font-family:var(--ff)}
.sb-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:var(--r2);cursor:pointer;color:var(--text2);font-size:.83em;font-weight:400;transition:all .18s;margin-bottom:2px;position:relative}
.sb-item:hover{background:var(--bg-glass);color:var(--text)}
.sb-item.on{background:var(--gold-soft);color:var(--gold);font-weight:600}
.sb-item.on::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:3px;background:var(--gold);border-radius:0 3px 3px 0}
.sb-icon{font-size:1em;width:22px;text-align:center}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:999}
.sb-ov.on{display:block}
.sb-ft{padding:12px 10px;border-top:1px solid var(--border)}
.sb-ft-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border-radius:var(--r2);cursor:pointer;color:var(--rose);font-size:.82em;font-weight:500;border:none;background:none;font-family:var(--fb);transition:all .2s}
.sb-ft-btn:hover{background:var(--rose-soft)}
/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);z-index:2000;justify-content:center;align-items:center;padding:16px}
.modal.on{display:flex}
.modal-box{background:var(--bg-surface);border:1px solid var(--border-bright);border-radius:var(--r4);padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;box-shadow:0 4px 40px rgba(0,0,0,.5);animation:slideUp .25s cubic-bezier(.22,1,.36,1)}
.modal-box h4{font-family:var(--ff);font-size:1.1em;font-weight:700;letter-spacing:-.02em;margin-bottom:16px}
.modal-box::-webkit-scrollbar{width:3px}.modal-box::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:3px}
/* CONFIRM / ALERT custom dialogs */
.dlg-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:3000;display:flex;justify-content:center;align-items:center;padding:20px;animation:fadeIn .15s ease}
.dlg-box{background:var(--bg-surface);border:1px solid var(--border-bright);border-radius:var(--r3);padding:24px;width:100%;max-width:340px;box-shadow:0 8px 40px rgba(0,0,0,.5);animation:slideUp .2s cubic-bezier(.22,1,.36,1)}
.dlg-icon{font-size:2em;text-align:center;margin-bottom:12px}
.dlg-title{font-family:var(--ff);font-size:1em;font-weight:700;text-align:center;margin-bottom:8px}
.dlg-msg{font-size:.82em;color:var(--text2);text-align:center;margin-bottom:20px;line-height:1.5}
.dlg-input{margin-bottom:16px}
.dlg-btns{display:flex;gap:8px}
.dlg-btns .btn{flex:1}
/* TOAST */
.toast-wrap{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);z-index:2500;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:90%;max-width:320px}
.toast{padding:11px 18px;border-radius:var(--r2);font-size:.82em;font-weight:600;font-family:var(--ff);text-align:center;animation:slideUp .3s ease;pointer-events:all;box-shadow:0 8px 30px rgba(0,0,0,.4);width:100%}
/* POS */
.pos-search{position:relative;margin-bottom:8px}
.pos-search::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:13px;z-index:1}
.pos-search input{padding-left:40px;margin-bottom:0}
.cat-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
.cat-btn{background:var(--bg-glass);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:.72em;cursor:pointer;color:var(--text2);font-family:var(--ff);font-weight:600;white-space:nowrap;transition:all .18s;flex-shrink:0}
.cat-btn.on{background:var(--gold-soft);border-color:var(--gold);color:var(--gold)}
.prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.prod-card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r2);padding:14px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.prod-card:hover{border-color:rgba(212,168,83,.4);transform:translateY(-1px)}
.prod-card:active{transform:scale(.96)}
.prod-card.oos{opacity:.35;pointer-events:none}
.prod-card strong{font-family:var(--ff);font-size:.85em;display:block;margin-bottom:4px}
.prod-card .pc-price{color:var(--gold);font-weight:700;font-size:.95em;font-family:var(--ff)}
.prod-card small{color:var(--text3);font-size:.67em}
.scan-wrap{position:relative;margin-bottom:8px}
.scan-wrap::before{content:'⚡';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;z-index:1;opacity:.6}
#scanInput{padding-left:40px;font-size:.95em;border-color:var(--emerald);font-family:var(--fm);margin-bottom:0}
.scan-hint{color:var(--emerald);font-size:.68em;text-align:center;margin-top:3px;font-weight:500;letter-spacing:.04em}
/* CART */
.cart-item{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);gap:8px}
.cart-item:last-of-type{border-bottom:none}
.qty-ctl{display:flex;align-items:center;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0}
.qb{background:var(--bg-elevated);border:none;color:var(--text);width:28px;height:28px;cursor:pointer;font-size:1em;display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-weight:700;transition:all .15s}
.qb:hover{background:var(--gold-soft);color:var(--gold)}

.print-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.print-btn{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r2);padding:18px 10px;cursor:pointer;text-align:center;transition:all .2s;color:var(--text);font-family:var(--ff);font-size:.78em;font-weight:600}

/* ── PHASE 4: Customer / Logo / Loyalty ── */

<script>
// ════════════════════════════════════════════
// DIALOG SYSTEM (replaces all alert/prompt/confirm)
// ════════════════════════════════════════════
function dlg(opts){
  return new Promise(resolve=>{
    const el=document.createElement('div');
    el.className='dlg-overlay';
    const icon=opts.icon||'💬';
    const type=opts.type||'alert'; // alert | confirm | prompt
    const color=opts.color||'var(--gold)';
    el.innerHTML=`<div class="dlg-box">
      <div class="dlg-icon">${icon}</div>
      <div class="dlg-title" style="color:${color}">${opts.title||''}</div>
      <div class="dlg-msg">${opts.msg||''}</div>
      ${type==='prompt'?`<div class="dlg-input"><input type="${opts.inputType||'text'}" id="dlgInput" placeholder="${opts.placeholder||''}" value="${opts.defaultVal||''}" style="margin-bottom:0"></div>`:''}
      <div class="dlg-btns">
        ${type!=='alert'?`<button class="btn bd" id="dlgCancel">${opts.cancelLabel||'Cancel'}</button>`:''}
        <button class="btn ${type==='confirm'&&opts.danger?'bd':'bp'}" id="dlgOk">${opts.okLabel||'OK'}</button>
      </div>
    </div>`;
    document.body.appendChild(el);
    setTimeout(()=>{
      const inp=el.querySelector('#dlgInput');if(inp)inp.focus();
      const ok=el.querySelector('#dlgOk');
      const cancel=el.querySelector('#dlgCancel');
      const finish=val=>{el.remove();resolve(val);};
      ok.onclick=()=>{
        if(type==='prompt'){const v=el.querySelector('#dlgInput').value;finish(v);}
        else finish(true);
      };
      if(cancel)cancel.onclick=()=>finish(type==='prompt'?null:false);
      el.addEventListener('keydown',e=>{if(e.key==='Enter')ok.click();if(e.key==='Escape'&&cancel)cancel.click();});
    },50);
  });
}
const alert2=(msg,icon='ℹ️',color='var(--blue)')=>dlg({type:'alert',icon,msg,color,okLabel:'OK'});
const confirm2=(msg,icon='⚠️',danger=false)=>dlg({type:'confirm',icon,msg,color:danger?'var(--rose)':'var(--gold)',danger,okLabel:'Confirm',cancelLabel:'Cancel'});
const prompt2=(msg,placeholder='',defaultVal='',inputType='text')=>dlg({type:'prompt',icon:'✏️',msg,placeholder,defaultVal,inputType,okLabel:'Save',cancelLabel:'Cancel',color:'var(--gold)'});

// ════════════════════════════════════════════
// TOAST SYSTEM
// ════════════════════════════════════════════
function toast(msg,color='gold',dur=3200){
  const wrap=document.getElementById('toastWrap');
  const t=document.createElement('div');t.className='toast';
  const c={gold:'var(--gold)',rose:'var(--rose)',emerald:'var(--emerald)',blue:'var(--blue)',purple:'var(--purple)'}[color]||'var(--gold)';
  t.style.cssText=`background:var(--bg-elevated);border:1px solid ${c};color:${c}`;
  t.textContent=msg;wrap.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400);},dur);
}

// ════════════════════════════════════════════
// STORAGE — LOCAL
// ════════════════════════════════════════════
const STORES=['products','sales','users','settings','branches','activityLogs','suppliers','purchaseOrders','voidedSales','heldSales','returns','customers'];
const LocalDB={
  init(){STORES.forEach(s=>{if(!localStorage.getItem('mlea_'+s))localStorage.setItem('mlea_'+s,'[]')})},
  getAll(k){try{return JSON.parse(localStorage.getItem('mlea_'+k)||'[]')}catch{return[]}},
  set(k,d){localStorage.setItem('mlea_'+k,JSON.stringify(d))},
  add(k,item){
    const items=this.getAll(k);
    item.id=items.reduce((max,i)=>Math.max(max,i.id||0),0)+1;
    item.createdAt=new Date().toISOString();
    items.push(item);this.set(k,items);return item.id;
  },
  update(k,item){
    const items=this.getAll(k);const idx=items.findIndex(i=>i.id===item.id);
    if(idx!==-1){item.updatedAt=new Date().toISOString();items[idx]=item;this.set(k,items);}
  },
  delete(k,id){this.set(k,this.getAll(k).filter(i=>i.id!==id))},
  getById(k,id){return this.getAll(k).find(i=>i.id===id)||null},
  getByBranch(k,bid){return this.getAll(k).filter(i=>i.branchId===bid)}
};
LocalDB.init();

// ════════════════════════════════════════════
// STORAGE — FIREBASE
// ════════════════════════════════════════════
let _fb=null; // firestore module refs
const FirebaseDB={
  _cache:{},
  async init(config){
    try{
      const{initializeApp,getApps}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
      const fs=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const app=getApps().length===0?initializeApp(config):getApps()[0];
      _fb={...fs,db:fs.getFirestore(app)};
      for(const s of STORES)await this._load(s);
      setSyncStatus('cloud','Connected ✓');return true;
    }catch(e){setSyncStatus('offline','Firebase error: '+e.message);return false;}
  },
  async _load(k){
    try{
      const snap=await _fb.getDocs(_fb.collection(_fb.db,k));
      this._cache[k]=snap.docs.map(d=>({...d.data(),_did:d.id}));
    }catch{this._cache[k]=this._cache[k]||[];}
  },
  getAll(k){return this._cache[k]||[]},
  set(k,arr){this._cache[k]=arr},
  add(k,item){
    const items=this.getAll(k);
    item.id=items.reduce((max,i)=>Math.max(max,i.id||0),0)+1;
    item.createdAt=new Date().toISOString();
    const did=k+'_'+item.id;item._did=did;items.push(item);this._cache[k]=items;
    this._write(k,did,item);
    // mirror to local
    const li=LocalDB.getAll(k);if(!li.find(i=>i.id===item.id)){li.push({...item});LocalDB.set(k,li);}
    return item.id;
  },
  update(k,item){
    const items=this.getAll(k);const idx=items.findIndex(i=>i.id===item.id);
    if(idx!==-1){item.updatedAt=new Date().toISOString();const did=item._did||k+'_'+item.id;item._did=did;items[idx]=item;this._cache[k]=items;
      this._write(k,did,item);
      const li=LocalDB.getAll(k);const li2=li.findIndex(i=>i.id===item.id);if(li2!==-1){li[li2]=item;LocalDB.set(k,li);}
    }
  },
  delete(k,id){
    const item=this.getById(k,id);this._cache[k]=(this._cache[k]||[]).filter(i=>i.id!==id);
    LocalDB.set(k,LocalDB.getAll(k).filter(i=>i.id!==id));
    if(item){const did=item._did||k+'_'+id;if(isOnline)this._del(k,did);else offQ.push({op:'del',col:k,did});}
  },
  getById(k,id){return(this._cache[k]||[]).find(i=>i.id===id)||null},
  getByBranch(k,bid){return(this._cache[k]||[]).filter(i=>i.branchId===bid)},
  async _write(col,did,data){
    if(!isOnline){offQ.push({op:'set',col,did,data});setSyncStatus('offline','Offline — queuing');return;}
    try{await _fb.setDoc(_fb.doc(_fb.db,col,did),data);setSyncStatus('cloud','Synced ✓');}
    catch(e){offQ.push({op:'set',col,did,data});setSyncStatus('offline','Sync error');}
  },
  async _del(col,did){
    try{await _fb.deleteDoc(_fb.doc(_fb.db,col,did));}
    catch(e){offQ.push({op:'del',col,did});}
  }
};

let offQ=[];
async function flushQ(){
  if(!_fb||!offQ.length)return;
  const q=[...offQ];offQ=[];
  for(const op of q){
    try{
      if(op.op==='set')await _fb.setDoc(_fb.doc(_fb.db,op.col,op.did),op.data);
      else await _fb.deleteDoc(_fb.doc(_fb.db,op.col,op.did));
    }catch{offQ.push(op);}
  }
  if(!offQ.length)setSyncStatus('cloud','All synced ✓');
}

// ════════════════════════════════════════════
// UNIFIED DB
// ════════════════════════════════════════════
let storageMode='local';
const DB={
  get _a(){return storageMode==='firebase'?FirebaseDB:LocalDB},
  getAll(k){return this._a.getAll(k)},
  set(k,d){this._a.set(k,d)},
  add(k,item){return this._a.add(k,item)},
  update(k,item){this._a.update(k,item)},
  delete(k,id){this._a.delete(k,id)},
  getById(k,id){return this._a.getById(k,id)},
  getByBranch(k,bid){return this._a.getByBranch(k,bid)}
};

// ════════════════════════════════════════════
// NETWORK
// ════════════════════════════════════════════
let isOnline=navigator.onLine;
window.addEventListener('online',()=>{isOnline=true;updateSyncBar();flushQ();});
window.addEventListener('offline',()=>{isOnline=false;updateSyncBar();});
function setSyncStatus(mode,msg){
  const dot=document.getElementById('syncDot'),lbl=document.getElementById('syncLabel'),sm=document.getElementById('syncMsg');
  if(!dot)return;
  dot.className='sdot '+mode;
  lbl.textContent=mode==='cloud'?'☁️ Firebase':mode==='local'?'💾 Local':'📴 Offline';
  if(sm)sm.textContent=msg||'';
}
function updateSyncBar(){
  const bar=document.getElementById('syncBar');if(!bar)return;bar.style.display='flex';
  if(storageMode==='firebase')setSyncStatus(isOnline?'cloud':'offline',isOnline?'Online':'Offline — queuing changes');
  else setSyncStatus('local','Local only');
}

// ════════════════════════════════════════════
// SETTINGS HELPERS
// ════════════════════════════════════════════
function getSetting(k,def=''){return LocalDB.getAll('settings').find(s=>s.key===k)?.value??def}
function saveSetting(k,v){
  const all=LocalDB.getAll('settings'),e=all.find(s=>s.key===k);
  if(e){e.value=v;LocalDB.update('settings',e);}else LocalDB.add('settings',{key:k,value:v});
  // also persist to Firebase if active
  if(storageMode==='firebase'){
    const all2=FirebaseDB.getAll('settings'),e2=all2.find(s=>s.key===k);
    if(e2){e2.value=v;FirebaseDB.update('settings',e2);}else FirebaseDB.add('settings',{key:k,value:v});
  }
}

// ════════════════════════════════════════════
// CURRENCIES
// ════════════════════════════════════════════
const CURR={

// Computes VAT respecting per-item vatExempt / zeroRated flags
// Pass the cart items array for accurate split; falls back to legacy total-based calc
function computeVAT(total,vatType,rate,items){
  if(vatType!=='vat')return{vatableSales:0,vatAmount:0,vatExempt:total,zeroRated:0,grandTotal:total};
  if(items&&items.length){
    // Split by item-level flags
    let vatableAmt=0,exemptAmt=0,zeroAmt=0;
    items.forEach(i=>{
      const lineNet=i.price*i.quantity;
      if(i.zeroRated)zeroAmt+=lineNet;
      else if(i.vatExempt)exemptAmt+=lineNet;
      else vatableAmt+=lineNet;
    });
    // vatableAmt is VAT-inclusive; back-compute
    const vatableSalesNet=vatableAmt/(1+rate);
    const vatAmount=vatableAmt-vatableSalesNet;
    return{vatableSales:vatableSalesNet,vatAmount,vatExempt:exemptAmt,zeroRated:zeroAmt,grandTotal:vatableSalesNet+vatAmount+exemptAmt+zeroAmt};
  }
  // Legacy fallback (no items passed)
  const vs=total/(1+rate);return{vatableSales:vs,vatAmount:total-vs,vatExempt:0,zeroRated:0,grandTotal:total};
}

// ════════════════════════════════════════════
// PIN HASHING — Web Crypto API (SHA-256 + salt)
// Replaces plaintext PIN storage.
// Format stored: "salt:hash" where both are hex strings.
// ════════════════════════════════════════════
async function hashPIN(pin, salt) {
  // Generate a random salt if not provided (new PINs)
  if (!salt) {
    const arr = crypto.getRandomValues(new Uint8Array(16));
    salt = Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  const encoder = new TextEncoder();
  const data = encoder.encode(salt + pin);
  const hashBuf = await crypto.subtle.digest('SHA-256', data);
  const hashHex = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2,'0')).join('');
  return { hash: hashHex, salt, stored: salt + ':' + hashHex };
}

async function verifyPIN(pin, stored) {
  // Support legacy plaintext PINs (migration path)
  if (!stored || !stored.includes(':')) {
    // Legacy: direct comparison, then auto-upgrade on success
    return stored === pin ? 'legacy' : false;
  }
  const [salt, expectedHash] = stored.split(':');
  const { hash } = await hashPIN(pin, salt);
  return hash === expectedHash ? 'hashed' : false;
}

async function hashAndStorePIN(userId, pin) {
  const { stored } = await hashPIN(pin);
  const u = LocalDB.getById('users', userId);
  if (u) { u.pin = stored; LocalDB.update('users', u); }
  if (storageMode === 'firebase') {
    const fu = FirebaseDB.getById('users', userId);
    if (fu) { fu.pin = stored; FirebaseDB.update('users', fu); }
  }
  return stored;
}

// Migrate all plaintext PINs to hashed on first run
async function migratePlaintextPINs() {
  const users = LocalDB.getAll('users');
  let migrated = 0;
  for (const u of users) {
    if (u.pin && !u.pin.includes(':')) {
      // Plaintext detected — hash it
      const { stored } = await hashPIN(u.pin);
      u.pin = stored;
      LocalDB.update('users', u);
      if (storageMode === 'firebase') {
        const fu = FirebaseDB.getById('users', u.id);
        if (fu) { fu.pin = stored; FirebaseDB.update('users', fu); }
      }
      migrated++;
    }
  }
  if (migrated > 0) {
    console.log(`PIN migration: ${migrated} user(s) upgraded to hashed storage`);
    logAct('Security', `PIN hashing migration: ${migrated} user(s) upgraded`);
  }
  return migrated;
}

function getCats(){return['All',...new Set(getMyData('products').filter(p=>p.active).map(p=>p.category||'General'))];}
function getFilteredProds(search=''){
  let prods=getMyData('products').filter(p=>p.active);
  if(selCat!=='All')prods=prods.filter(p=>(p.category||'General')===selCat);
  if(search)prods=prods.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||(p.sku||'').toLowerCase().includes(search.toLowerCase())||(p.barcode||'').includes(search));
  return prods;
}
function quickCash(total){
  const bills=[20,50,100,200,500,1000];const seen=new Set();const out=[];
  bills.forEach(b=>{if(b>=total&&out.length<4&&!seen.has(b)){seen.add(b);out.push(b);}});
  if(!out.length){const c=Math.ceil(total/100)*100;if(!seen.has(c)){seen.add(c);out.push(c);}}
  const next=Math.ceil(total/50)*50;if(!seen.has(next)&&out.length<4){seen.add(next);out.push(next);}
  return out.sort((a,b)=>a-b).slice(0,4);
}
function updChange(total){
  const cash=parseFloat(document.getElementById('cashInput')?.value)||0;
  const cd=document.getElementById('chgDisp'),ca=document.getElementById('chgAmt'),im=document.getElementById('insufMsg');
  if(!cd)return;
  if(cash>=total){cd.style.display='block';if(ca)ca.textContent=fc(cash-total);if(im)im.style.display='none';}
  else{cd.style.display='none';if(im)im.style.display='block';}
}
function updCartQty(idx,delta){if(cart[idx]){cart[idx].quantity=Math.max(1,cart[idx].quantity+delta);renderPOS(document.getElementById('mainContent'));}}
function setCartQty(idx,val){if(cart[idx]){cart[idx].quantity=Math.max(1,parseInt(val)||1);renderPOS(document.getElementById('mainContent'));}}
function applyItemDisc(idx){
  prompt2(`Discount % for "${cart[idx].name}":`, '0', '0', 'number').then(v=>{
    const pct=parseFloat(v)||0;
    if(pct>0&&pct<=100){cart[idx].price=parseFloat((cart[idx].origPrice*(1-pct/100)).toFixed(2));cart[idx].discPct=pct;renderPOS(document.getElementById('mainContent'));}
  });
}
function applyDisc(type){
  const sub=cart.reduce((s,i)=>s+(i.price*i.quantity),0);
  if(type==='sc'||type==='pwd'){discType=type;discAmt=sub*0.20;}
  else if(type==='promo'){
    prompt2('Enter promo discount %:','0','0','number').then(v=>{
      const pct=parseFloat(v)||0;discType='promo';discAmt=sub*(pct/100);
      renderPOS(document.getElementById('mainContent'));
    });return;
  }else{discType='none';discAmt=0;}
  renderPOS(document.getElementById('mainContent'));
}

function addToCart(sku){

async function doSplitPay(total){
  const cash=parseFloat(document.getElementById('splitCash').value)||0;
  const card=parseFloat(document.getElementById('splitCard').value)||0;
  if(cash+card<total-0.01){toast('Amounts do not cover total','rose');return;}
  closeModal();await _finalizePay('split',cash,card);
}

async function doPay(method){
  if(!cart.length){toast('Cart is empty','rose');return;}
  const bir=getBIR();
  const subBD=cart.reduce((s,i)=>s+(i.price*i.quantity),0);
  const effDisc=Math.min(discAmt,subBD);const sub=subBD-effDisc;
  const discRatio=subBD>0?(sub/subBD):1;
  const scaledItems=cart.map(i=>({...i,price:i.price*discRatio}));
  const vatD=computeVAT(sub,bir.vatType,taxRate,scaledItems);
  const total=vatD.grandTotal;
  if(method==='cash'){
    const cashEl=document.getElementById('cashInput');
    const cash=parseFloat(cashEl?cashEl.value:0)||0;
    if(cash<=0){toast('Enter cash amount tendered','rose');return;}
    if(cash<total){toast('Cash ('+fc(cash)+') is less than total ('+fc(total)+')','rose');return;}
    _finalizePay('cash',cash,cash-total);
  }else{
    _finalizePay(method,total,0);
  }
}

function _finalizePay(method,cashTendered,secondAmt){
  if(!cart.length){toast('Cart is empty','rose');return;}
  const bir=getBIR();
  const subBD=cart.reduce((s,i)=>s+(i.price*i.quantity),0);
  const effDisc=Math.min(discAmt,subBD);const sub=subBD-effDisc;
  const discRatio=subBD>0?(sub/subBD):1;
  const scaledItems=cart.map(i=>({...i,price:i.price*discRatio}));
  const vatD=computeVAT(sub,bir.vatType,taxRate,scaledItems);
  const total=vatD.grandTotal;
  // Fix: card payment should record cashTendered=0, changeGiven=0
  let changeGiven=0,splitCard=0,actualCash=cashTendered;
  if(method==='split'){splitCard=secondAmt;changeGiven=Math.max(0,cashTendered+splitCard-total);}
  else if(method==='cash'){changeGiven=secondAmt;}
  else{actualCash=0;changeGiven=0;} // card: no cash involved
  const orNum=getNextOR();
  const branchObj=currentUser.branchId?LocalDB.getById('branches',currentUser.branchId):null;
  const gat=updateGAT(total);
  const sale={
    date:new Date().toISOString().split('T')[0],timestamp:new Date().toISOString(),
    total,subtotal:sub,subtotalBeforeDiscount:subBD,discountAmount:effDisc,discountType:discType,
    tax:vatD.vatAmount,vatableSales:vatD.vatableSales,vatExemptSales:vatD.vatExempt,zeroRatedSales:vatD.zeroRated,
    paymentMethod:method,cashTendered:actualCash,changeGiven,splitCard,
    cashierId:currentUser.id,cashierName:currentUser.name,
    branchId:currentUser.branchId,branchName:branchObj?branchObj.name:'HQ',
    currency:cur,orNumber:orNum,vatType:bir.vatType,docType:bir.docType,
    grandAccumulatedTotal:gat,voided:false,
    items:cart.map(i=>({productId:i.id,name:i.name,quantity:i.quantity,price:i.price,cost:i.cost||0,unit:i.unit||'pcs',vatExempt:i.vatExempt||false,zeroRated:i.zeroRated||false}))
  };
  const saleId=DB.add('sales',sale);
  cart.forEach(item=>{
    const p=LocalDB.getById('products',item.id);
    if(p){p.stock-=item.quantity;LocalDB.update('products',p);if(storageMode==='firebase')FirebaseDB.update('products',p);}
  });
  logAct('Sale',orNum+': '+fc(total));
  lastSale={...sale,id:saleId};
  discAmt=0;discType='none';
  showSaleComplete(saleId,total,method,orNum,actualCash,changeGiven,splitCard);
  cart=[];
}

async function voidSale(id){
  const sale=DB.getById('sales',id);if(!sale){toast('Sale not found','rose');return;}
  if(sale.voided){toast('Already voided','rose');return;}
  const reason=await prompt2('Reason for void (required for BIR):','e.g. Wrong item entered');
  if(!reason||!reason.trim()){toast('Void reason is required','rose');return;}
  const ok=await confirm2(`Void ${sale.orNumber||'#'+id} for ${fc(sale.total)}?\nThis is permanent and logged for BIR audit.`,'🚫',true);
  if(!ok)return;
  (sale.items||[]).forEach(item=>{
    const p=LocalDB.getById('products',item.productId);
    if(p){p.stock+=item.quantity;LocalDB.update('products',p);if(storageMode==='firebase')FirebaseDB.update('products',p);}
  });
  sale.voided=true;sale.voidReason=reason;sale.voidedBy=currentUser.name;sale.voidedAt=new Date().toISOString();
  DB.update('sales',sale);
  // Adjust GAT
  const all=LocalDB.getAll('settings');const e=all.find(s=>s.key==='bir_gat');
  if(e){e.value=Math.max(0,parseFloat(e.value)-sale.total).toFixed(2);LocalDB.update('settings',e);if(storageMode==='firebase')FirebaseDB.update('settings',e);}
  DB.add('voidedSales',{originalSaleId:id,orNumber:sale.orNumber,amount:sale.total,reason,voidedBy:currentUser.name,timestamp:new Date().toISOString()});
  logAct('VOID',`${sale.orNumber||'#'+id}: ${fc(sale.total)} — ${reason}`);
  toast('Transaction voided and logged ✓','emerald');sw(currentView);
}

function showPOModal(){
  const suppliers=DB.getAll('suppliers');
  openModal(`<h4>New Purchase Order</h4>
    <label class="inp-label">Supplier</label>
    <select id="mi0"><option value="">Select Supplier</option>${suppliers.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select>
    <label class="inp-label">Item Name</label><input type="text" id="mi1" placeholder="e.g. Rice 50kg">
    <label class="inp-label">Quantity</label><input type="number" id="mi2" value="1" min="1">
    <label class="inp-label">Cost per Unit</label><input type="number" id="mi3" step="0.01" placeholder="0.00">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
      <button class="btn bd" onclick="closeModal()">Cancel</button>
      <button class="btn bp" onclick="savePO()">Create Order</button>
    </div>`);
}
function savePO(){
  const supplierId=parseInt(document.getElementById('mi0').value)||null;
  const n=document.getElementById('mi1').value,q=parseInt(document.getElementById('mi2').value)||0,c=parseFloat(document.getElementById('mi3').value)||0;
  // Try to match existing product for productId linkage
  const matchedProd=getMyData('products').find(p=>p.name.toLowerCase()===n.toLowerCase());
  const items=n&&q>0?[{name:n,quantity:q,cost:c,total:q*c,productId:matchedProd?matchedProd.id:null}]:[];
  const total=items.reduce((s,i)=>s+i.total,0);
  DB.add('purchaseOrders',{supplierId,items,total,status:'ordered',date:new Date().toISOString().split('T')[0],branchId:currentUser.branchId});
  closeModal();sw('purchaseOrders');toast('Purchase order created ✓','emerald');
}
async function receivePO(id){
  const po=DB.getById('purchaseOrders',id);if(!po)return;
  const ok=await confirm2('Mark PO #'+id+' as received? This will add stock to matching products.','📦');
  if(!ok)return;
  po.status='received';DB.update('purchaseOrders',po);
  (po.items||[]).forEach(item=>{
    // Match by productId first (accurate), fall back to name (legacy)
    let product=item.productId?DB.getById('products',item.productId):null;
    if(!product)product=getMyData('products').find(p=>p.name.toLowerCase()===item.name.toLowerCase());
    if(product){product.stock+=item.quantity;product.cost=item.cost;DB.update('products',product);}
    else toast('⚠️ Product not found for PO item: '+item.name,'rose',5000);
  });
  logAct('PO Received','#'+id);sw('purchaseOrders');toast('PO received — stock updated ✓','emerald');
}
async function deletePO(id){
  const ok=await confirm2('Delete this purchase order?','📋',true);
  if(ok){DB.delete('purchaseOrders',id);sw('purchaseOrders');}
}

async function adjStock(id){
  const p=DB.getById('products',id);
  const val=await prompt2(`Update stock for "${p.name}" (current: ${p.stock}):`,String(p.stock),String(p.stock),'number');

  p.stock=Math.max(0,qty);DB.update('products',p);sw(currentView);toast('Stock updated ✓','emerald');
}
async function deleteProduct(id){

}

function validatePINMatch(){
  const p1=document.getElementById('uPin')?.value||'';
  const p2=document.getElementById('uPinConfirm')?.value||'';
  const msg=document.getElementById('pinMatchMsg');if(!msg)return;
  if(!p1&&!p2){msg.textContent='';return;}
  if(p1.length<4){msg.style.color='var(--text3)';msg.textContent='Enter 4 digits';return;}
  if(p1===p2){msg.style.color='var(--emerald)';msg.textContent='✓ PINs match';}
  else{msg.style.color='var(--rose)';msg.textContent='✗ PINs do not match';}
}

async function saveUser(id){
  const errEl=document.getElementById('uModalErr');
  const name=(document.getElementById('uName')?.value||'').trim();
  const role=document.getElementById('uRole')?.value||'cashier';
  const branchEl=document.getElementById('uBranch');
  const branchId=branchEl&&branchEl.value?parseInt(branchEl.value):currentUser.branchId||null;
  const pin1=document.getElementById('uPin')?.value||'';
  const pin2=document.getElementById('uPinConfirm')?.value||'';
  const active=document.getElementById('uActive')?.checked!==false;
  const isNew=!id||id==='null'||id===null;
  if(!name){errEl.textContent='Full name is required';return;}
  if(isNew&&!pin1){errEl.textContent='PIN is required for new users';return;}
  if(pin1){
    if(pin1.length!==4||!/^\d{4}$/.test(pin1)){errEl.textContent='PIN must be exactly 4 digits (numbers only)';return;}
    if(pin1!==pin2){errEl.textContent='PINs do not match';return;}
  }
  if(currentUser.role==='manager'&&role!=='cashier'){errEl.textContent='Managers can only create cashier accounts';return;}
  if(id&&parseInt(id)===currentUser.id&&role!==currentUser.role&&currentUser.role==='admin'&&role!=='admin'){errEl.textContent='Cannot demote your own admin account';return;}
  const btn=document.getElementById('uSaveBtn');if(btn)btn.disabled=true;
  if(isNew){
    // Hash PIN before storing
    const {stored}=await hashPIN(pin1);
    DB.add('users',{name,role,active,pin:stored,branchId});
    logAct('User Created',`${name} (${role}) by ${currentUser.name}`);
    closeModal();sw(currentView);renderLogin();
    toast(`✓ ${name} created as ${role}`,'emerald',5000);
  }else{
    const u=DB.getById('users',parseInt(id));
    if(!u){errEl.textContent='User not found';if(btn)btn.disabled=false;return;}
    const changes=[];
    if(u.name!==name)changes.push(`name → ${name}`);
    if(currentUser.role==='admin'&&u.role!==role)changes.push(`role → ${role}`);
    if(pin1)changes.push('PIN changed');
    if(u.active!==active)changes.push(active?'activated':'deactivated');
    u.name=name;
    if(currentUser.role==='admin'){u.role=role;u.branchId=branchId||null;}
    // Hash new PIN before storing
    if(pin1){const {stored}=await hashPIN(pin1);u.pin=stored;}
    u.active=active;
    DB.update('users',u);
    logAct('User Updated',`${name}: ${changes.join(', ')} by ${currentUser.name}`);
    closeModal();sw(currentView);renderLogin();
    toast(`✓ ${name} updated`,'emerald');
    if(parseInt(id)===currentUser.id&&pin1)
      setTimeout(()=>toast('Your PIN has been changed. Use the new PIN on next login.','gold',6000),600);
  }
}

async function deleteUserSafe(id,name,role){

  if(currentUser.role==='manager'){

    if(!t||t.role!=='cashier'||t.branchId!==currentUser.branchId){toast('You can only delete cashiers in your branch','rose');return;}

  DB.delete('users',id);

}

async function processReturn(){
  const orNum=document.getElementById('retOR')?.value.trim()||'';
  const reason=document.getElementById('retReason')?.value.trim()||'';
  if(!orNum){toast('OR number is required','rose');return;}
  if(!reason){toast('Return reason is required','rose');return;}
  const sale=DB.getAll('sales').find(s=>s.orNumber===orNum&&!s.voided);
  if(!sale){toast('Sale not found: '+orNum,'rose');return;}
  const ok=await confirm2(`Process return for ${orNum}?\nRefund amount: ${fc(sale.total)}.\nStock will be restored.`,'↩️');
  if(!ok)return;
  DB.add('returns',{date:new Date().toISOString().split('T')[0],orNumber:orNum,saleId:sale.id,items:sale.items,refundAmount:sale.total,reason,processedBy:currentUser.name,branchId:currentUser.branchId,timestamp:new Date().toISOString()});
  (sale.items||[]).forEach(item=>{const p=LocalDB.getById('products',item.productId);if(p){p.stock+=item.quantity;LocalDB.update('products',p);if(storageMode==='firebase')FirebaseDB.update('products',p);}});
  const e=LocalDB.getAll('settings').find(s=>s.key==='bir_gat');
  if(e){e.value=Math.max(0,parseFloat(e.value)-sale.total).toFixed(2);LocalDB.update('settings',e);if(storageMode==='firebase')FirebaseDB.update('settings',e);}
  logAct('Return','OR '+orNum+': '+fc(sale.total)+' — '+reason);
  closeModal();toast('Return processed. Refund: '+fc(sale.total),'emerald');sw('returns');
}

function getDayData(date){
  date=date||new Date().toISOString().split('T')[0];
  const sales=DB.getAll('sales').filter(s=>s.date===date&&!s.voided);
  const voided=DB.getAll('sales').filter(s=>s.date===date&&s.voided);
  return{
    sales,voided,
    total:sales.reduce((a,s)=>a+s.total,0),
    vat:sales.reduce((a,s)=>a+(s.tax||0),0),
    vs:sales.reduce((a,s)=>a+(s.vatableSales||0),0),
    ve:sales.reduce((a,s)=>a+(s.vatExemptSales||0),0),
    cash:sales.filter(s=>s.paymentMethod==='cash').reduce((a,s)=>a+s.total,0),
    card:sales.filter(s=>s.paymentMethod==='card').reduce((a,s)=>a+s.total,0),
    split:sales.filter(s=>s.paymentMethod==='split').reduce((a,s)=>a+s.total,0),

async function resetGAT(){
  const ok1=await confirm2(
    '⚠️ RESET Grand Accumulated Total?\n\nThis should ONLY be done when:\n• BIR explicitly orders a reset in writing\n• A new PTU/Permit to Use has been issued\n\nResetting without a new PTU will cause duplicate OR numbers — a serious BIR violation.',
    '⚠️',true
  );
  if(!ok1)return;
  const ok2=await confirm2(
    'FINAL CONFIRMATION\n\nHave you received a new PTU (Permit to Use) from BIR?\n\nIf NO — do not proceed. Duplicate OR numbers are a BIR violation.',
    '🏛️',true
  );
  if(!ok2)return;
  saveSetting('bir_gat','0');
  saveSetting('bir_counter','0');
  logAct('GAT RESET','⚠️ GAT and OR counter reset to zero by '+currentUser.name+' — requires new PTU');
  toast('⚠️ GAT and OR counter reset. Ensure new PTU is configured in BIR Setup.','rose',7000);
  sw('birSetup');
}

async function migrateToFB(){
  if(storageMode!=='firebase'){toast('Connect Firebase first','rose');return;}

  if(!ok)return;
  toast('Migrating…','gold',15000);let count=0;
  for(const store of STORES){
    const items=LocalDB.getAll(store);
    for(const item of items){

    }
  }

function downloadBackup(){
  const data={};STORES.forEach(s=>data[s]=LocalDB.getAll(s));
  data.backupDate=new Date().toISOString();data.bir=getBIR();data.gat=getGAT();data.version='5.0';
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`mlea_backup_v5_${new Date().toISOString().split('T')[0]}.json`;a.click();
  saveSetting('last_backup_ts',String(Date.now()));

async function restoreBackup(){
  const file=document.getElementById('restoreFile').files[0];
  if(!file){toast('Select a backup file','rose');return;}
  const ok=await confirm2('This will REPLACE all current data with the backup. Make sure you have exported a current backup first.','⚠️',true);
  if(!ok)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const d=JSON.parse(e.target.result);
      if(!d.version)throw new Error('Invalid backup format');
      STORES.forEach(s=>{if(d[s])LocalDB.set(s,d[s]);});
      toast('Data restored ✓ Reloading…','emerald');
      setTimeout(()=>location.reload(),1500);
    }catch(err){toast('Invalid backup file: '+err.message,'rose');}
  };
  reader.readAsText(file);
}
function exportCSV(type){

// Secret key sequence: "devconsole" (no modifier keys needed)
const _DEV_SEQ = 'devconsole';
let _devBuf = '';
let _devLastKey = 0;

function _devSeqDetect(key) {
  const now = Date.now();
  // Reset buffer if >2s gap between keystrokes
  if (now - _devLastKey > 2000) _devBuf = '';
  _devLastKey = now;
  // Only track lowercase letters
  if (key.length === 1 && /[a-z]/.test(key)) {
    _devBuf = (_devBuf + key).slice(-_DEV_SEQ.length);
    if (_devBuf === _DEV_SEQ) {
      _devBuf = '';
      _showDevAuth();

  }
}

// To change: run hashPIN('yourpassword','devstatic') and replace hash below
const _DEV_PWD_HASH = 'devstatic:' + ''; // placeholder — computed on first load
let _devPwdReady = false;

// Pre-compute the dev password hash on load so comparison is instant
(async function() {
  try {
    const enc = new TextEncoder();
    const buf = await crypto.subtle.digest('SHA-256', enc.encode('devstatic' + 'MLEAdev#2024!'));
    const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    window._DEV_HASH = 'devstatic:' + hex;
    _devPwdReady = true;
  } catch(e) {
    // Fallback if crypto unavailable
    window._DEV_HASH = null;
    _devPwdReady = false;
  }
})();

async function _devAuth() {
  const pwd = document.getElementById('_devPwd')?.value || '';
  const errEl = document.getElementById('_devAuthErr');
  if (!pwd) { if(errEl) errEl.textContent = 'Password required'; return; }

  // Hash the entered password and compare
  let match = false;
  if (_devPwdReady && window._DEV_HASH) {
    const enc = new TextEncoder();
    const buf = await crypto.subtle.digest('SHA-256', enc.encode('devstatic' + pwd));
    const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    match = ('devstatic:' + hex) === window._DEV_HASH;
  } else {
    // Fallback if crypto failed to init
    match = pwd === 'MLEAdev#2024!';
  }

  if (!match) {
    if(errEl) errEl.textContent = 'Incorrect password';
    // Log failed attempt
    const entry = {
      userId: currentUser?.id || 0,
      userName: currentUser?.name || 'Unknown',

}

// ── Integrity Check ───────────────────────────────────────────
function _devRunIntegrityCheck() {
  const results = [];
  const sales = LocalDB.getAll('sales');
  const products = LocalDB.getAll('products');
  const users = LocalDB.getAll('users');

  // Duplicate OR numbers
  const orNums = sales.filter(s=>s.orNumber).map(s=>s.orNumber);
  const dupORs = orNums.filter((o,i)=>orNums.indexOf(o)!==i);
  results.push(dupORs.length===0
    ? '✅ No duplicate OR numbers'
    : `🔴 ${dupORs.length} duplicate OR number(s): ${[...new Set(dupORs)].slice(0,5).join(', ')}`);

  // OR counter vs actual max
  const maxORNum = sales.reduce((max,s)=>{
    const n=parseInt((s.orNumber||'').replace(/\D/g,''))||0;
    return Math.max(max,n);
  },0);
  const storedCounter = parseInt(getSetting('bir_counter','0'))||0;
  results.push(storedCounter >= maxORNum
    ? `✅ OR counter (${storedCounter}) ≥ max in sales (${maxORNum})`
    : `🔴 OR counter (${storedCounter}) < max in sales (${maxORNum}) — gap of ${maxORNum-storedCounter}`);

  // GAT vs sum of sales
  const calcGAT = sales.filter(s=>!s.voided).reduce((a,s)=>a+s.total,0);
  const storedGAT = getGAT();
  const diff = Math.abs(calcGAT - storedGAT);
  results.push(diff < 0.01
    ? `✅ GAT matches (${fc(storedGAT)})`
    : `🟡 GAT mismatch: stored ${fc(storedGAT)} vs calculated ${fc(calcGAT)} (diff: ${fc(diff)})`);

  // Voided sales still in GAT
  const voidedTotal = sales.filter(s=>s.voided).reduce((a,s)=>a+s.total,0);
  results.push(voidedTotal===0
    ? '✅ No voided sales impact on GAT'
    : `ℹ️ ${sales.filter(s=>s.voided).length} voided sale(s) totalling ${fc(voidedTotal)} — excluded from GAT`);

  // Products with negative stock
  const negStock = products.filter(p=>p.stock<0);
  results.push(negStock.length===0
    ? '✅ No negative stock values'
    : `🔴 ${negStock.length} product(s) with negative stock: ${negStock.map(p=>p.name).slice(0,3).join(', ')}`);

  // Users with unhashed PINs
  const plaintextUsers = users.filter(u=>u.pin&&!u.pin.includes(':'));
  results.push(plaintextUsers.length===0
    ? '✅ All PINs are hashed'
    : `🟡 ${plaintextUsers.length} user(s) still have plaintext PINs: ${plaintextUsers.map(u=>u.name).join(', ')}`);

  // Duplicate user IDs
  const uids = users.map(u=>u.id);
  const dupUIDs = uids.filter((id,i)=>uids.indexOf(id)!==i);
  results.push(dupUIDs.length===0
    ? '✅ No duplicate user IDs'
    : `🔴 Duplicate user IDs found: ${[...new Set(dupUIDs)].join(', ')}`);

  // localStorage vs IDB sync
  const lsCount = STORES.reduce((a,s)=>a+LocalDB.getAll(s).length,0);
  results.push(`ℹ️ localStorage total records: ${lsCount}`);

  const html = results.map(r=>`<div style="padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)">${r}</div>`).join('');
  return { results, html };
}

function _devRepairOR() {

// ── Storage Resync ────────────────────────────────────────────
async function _devResync(direction) {
  const el = document.getElementById('_devSyncStatus');
  if(el) el.innerHTML = '<span style="color:var(--gold)">Syncing…</span>';
  let count = 0;
  try {
    if (direction === 'ls_to_idb') {
      if(!_idb){if(el)el.innerHTML='<span style="color:var(--rose)">IDB not available</span>';return;}
      count = await IDB.migrateFromLocal();
      logAct('DEV: Storage Resync', `localStorage → IDB: ${count} records`);
    } else {
      // IDB → localStorage
      for(const store of STORES){
        const items = await IDB.getAll(store);
        if(items.length){LocalDB.set(store,items);count+=items.length;}
      }
      logAct('DEV: Storage Resync', `IDB → localStorage: ${count} records`);
    }
    if(el) el.innerHTML = `<span style="color:var(--emerald)">✓ Synced ${count} records</span>`;
  } catch(e) {
    if(el) el.innerHTML = `<span style="color:var(--rose)">Error: ${e.message}</span>`;
  }
}

// ── Orphan Cleanup ────────────────────────────────────────────
let _devOrphansFound = [];
function _devFindOrphans() {
  const sales = LocalDB.getAll('sales');
  const users = LocalDB.getAll('users');
  const products = LocalDB.getAll('products');
  const branches = LocalDB.getAll('branches');
  const pos = LocalDB.getAll('purchaseOrders');
  const suppliers = LocalDB.getAll('suppliers');
  const orphans = [];

  // Sales with non-existent cashier
  sales.forEach(s=>{
    if(s.cashierId&&!users.find(u=>u.id===s.cashierId))
      orphans.push({type:'sale',id:s.id,issue:`Cashier ID ${s.cashierId} not found`});
  });
  // Sales items with non-existent product
  sales.forEach(s=>(s.items||[]).forEach(it=>{
    if(it.productId&&!products.find(p=>p.id===it.productId))
      orphans.push({type:'sale_item',id:s.id,issue:`Product ID ${it.productId} (${it.name}) not in products`});
  }));
  // Products with invalid branch
  products.forEach(p=>{
    if(p.branchId&&!branches.find(b=>b.id===p.branchId))
      orphans.push({type:'product',id:p.id,issue:`Branch ID ${p.branchId} not found`});
  });
  // POs with missing supplier
  pos.forEach(po=>{
    if(po.supplierId&&!suppliers.find(s=>s.id===po.supplierId))
      orphans.push({type:'po',id:po.id,issue:`Supplier ID ${po.supplierId} not found`});
  });
  // Users with invalid branch
  users.forEach(u=>{
    if(u.branchId&&!branches.find(b=>b.id===u.branchId))
      orphans.push({type:'user',id:u.id,issue:`Branch ID ${u.branchId} not found`});
  });

  _devOrphansFound = orphans;
  const el = document.getElementById('_devOrphanResult');
  const btn = document.getElementById('_devCleanBtn');
  if(!orphans.length){
    if(el) el.innerHTML = '<span style="color:var(--emerald)">✅ No orphan records found</span>';
    if(btn) btn.style.display='none';
  } else {
    if(el) el.innerHTML = `<span style="color:var(--rose)">⚠ ${orphans.length} orphan(s) found:</span><br>`+orphans.slice(0,8).map(o=>`<div style="padding:2px 0;color:rgba(255,255,255,.4)">[${o.type} #${o.id}] ${o.issue}</div>`).join('')+(orphans.length>8?`<div style="color:rgba(255,255,255,.3)">…and ${orphans.length-8} more</div>`:'');
    if(btn) btn.style.display='block';
  }
  logAct('DEV: Orphan Scan', `Found ${orphans.length} orphan record(s)`);
}
async function _devCleanOrphans() {
  if(!_devOrphansFound.length){toast('No orphans to clean','gold');return;}
  const ok = await confirm2(`Remove ${_devOrphansFound.length} orphan record(s)? This modifies live data.`,'🧹',true);
  if(!ok)return;
  // For safety, we only null-out bad references rather than deleting records
  _devOrphansFound.forEach(o=>{
    if(o.type==='product'){const p=LocalDB.getById('products',o.id);if(p){p.branchId=null;LocalDB.update('products',p);}}
    if(o.type==='user'){const u=LocalDB.getById('users',o.id);if(u){u.branchId=null;LocalDB.update('users',u);}}
    if(o.type==='po'){const po=LocalDB.getById('purchaseOrders',o.id);if(po){po.supplierId=null;LocalDB.update('purchaseOrders',po);}}
  });
  logAct('DEV: Orphan Cleanup', `Nulled references in ${_devOrphansFound.length} record(s)`);
  _devOrphansFound=[];
  const el=document.getElementById('_devOrphanResult');
  if(el)el.innerHTML='<span style="color:var(--emerald)">✓ Orphan references cleared</span>';
  document.getElementById('_devCleanBtn').style.display='none';
}

// ── Emergency PIN Reset ───────────────────────────────────────
async function _devResetPIN() {
  const userId = parseInt(document.getElementById('_devUserSel')?.value);
  const newPIN = document.getElementById('_devNewPIN')?.value||'';
  const resEl = document.getElementById('_devPINResult');
  if(!userId){if(resEl)resEl.innerHTML='<span style="color:var(--rose)">Select a user</span>';return;}
  if(!newPIN||newPIN.length!==4||!/^\d{4}$/.test(newPIN)){if(resEl)resEl.innerHTML='<span style="color:var(--rose)">PIN must be exactly 4 digits</span>';return;}
  const u = LocalDB.getById('users', userId);
  if(!u){if(resEl)resEl.innerHTML='<span style="color:var(--rose)">User not found</span>';return;}
  const {stored} = await hashPIN(newPIN);
  u.pin = stored;
  LocalDB.update('users', u);
  if(storageMode==='firebase'){const fu=FirebaseDB.getById('users',userId);if(fu){fu.pin=stored;FirebaseDB.update('users',fu);}}
  logAct('DEV: Emergency PIN Reset', `PIN reset for user "${u.name}" (ID: ${userId})`);
  if(resEl)resEl.innerHTML=`<span style="color:var(--emerald)">✓ PIN reset for ${u.name}. New PIN: ${newPIN}</span>`;
  if(document.getElementById('_devNewPIN'))document.getElementById('_devNewPIN').value='';
}

function _devInspect(store) {
  const data = LocalDB.getAll(store);
  const out = document.getElementById('_devInspectOut');
  if(!out)return;
  // Redact PIN hashes for security
  const safe = data.map(r=>{
    const c={...r};
    if(c.pin)c.pin='[REDACTED]';
    return c;
  });
  out.style.display='block';
  out.textContent = JSON.stringify(safe, null, 2);
  logAct('DEV: Store Inspected', `Viewed "${store}" (${data.length} records)`);
}


async function bootFirebase(){
  let savedConfig='',savedMode='local';
  try{
    const dbSettings=LocalDB.getAll('settings');
    const cfgE=dbSettings.find(s=>s.key==='firebase_config');
    const modeE=dbSettings.find(s=>s.key==='storageMode');
    if(cfgE)savedConfig=cfgE.value;
    if(modeE)savedMode=modeE.value;
  }catch{}
  // Guard: only attempt if config is non-empty valid JSON and mode is firebase
  if(savedMode==='firebase'&&savedConfig&&savedConfig.trim().startsWith('{')){
    try{
      const cfg=JSON.parse(savedConfig);
      if(!cfg.apiKey||!cfg.projectId)throw new Error('Missing apiKey or projectId');
      const ok=await FirebaseDB.init(cfg);
      if(ok){storageMode='firebase';}
      else{storageMode='local';setSyncStatus('offline','Firebase unavailable — using local');}
    }catch(e){
      storageMode='local';

async function initFBAuth(app) {

    _fbAuth = { ...authMod, auth: authMod.getAuth(app) };

async function fbSignIn(email, password) {

      : e.message;
    return { ok: false, error: msg };
  }
}

// Returns OR number from Cloud Function if available, falls back to local counter
// ════════════════════════════════════════════
// RECEIPT INTEGRITY — SHA-256 HASH + QR CODE
// Each sale gets a hash of its key fields.
// Printed as a QR code on receipts.
// Anyone can verify the receipt is unaltered.
// ════════════════════════════════════════════

async function generateReceiptHash(sale) {
  // Canonical string of key fields — order matters
  const payload = [
    sale.orNumber || sale.id,
    sale.date,
    sale.total.toFixed(2),
    sale.cashierName || '',
    sale.branchName || '',
    sale.vatType || '',
    (sale.items || []).map(i => `${i.name}:${i.quantity}:${i.price.toFixed(2)}`).join('|'),
    sale.vatableSales ? sale.vatableSales.toFixed(2) : '0.00',
    sale.tax ? sale.tax.toFixed(2) : '0.00',
  ].join('||');
  try {
    const enc = new TextEncoder();
    const buf = await crypto.subtle.digest('SHA-256', enc.encode(payload));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  } catch(e) { return ''; }
}

// Store hash on sale record after creation
async function attachReceiptHash(saleId) {
  const sale = LocalDB.getById('sales', saleId);
  if (!sale) return '';
  const hash = await generateReceiptHash(sale);
  if (!hash) return '';
  sale.receiptHash = hash;
  sale.receiptHashTs = new Date().toISOString();
  LocalDB.update('sales', sale);
  if (storageMode === 'firebase') {
    const fs = FirebaseDB.getById('sales', saleId);
    if (fs) { fs.receiptHash = hash; fs.receiptHashTs = sale.receiptHashTs; FirebaseDB.update('sales', fs); }
  }
  return hash;
}

// Verify a receipt hash (for display/audit)
async function verifyReceiptHash(sale) {
  if (!sale.receiptHash) return 'unverified';
  const computed = await generateReceiptHash(sale);
  return computed === sale.receiptHash ? 'valid' : 'tampered';
}

// Load QRCode.js on demand (lightweight, offline-capable via SW cache)
async function loadQRLib() {
  if (window.QRCode) return true;
  return new Promise(resolve => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    s.onload = () => resolve(true);
    s.onerror = () => resolve(false);
    document.head.appendChild(s);
  });
}

// Generate QR data URL from text
async function generateQRDataURL(text) {
  const loaded = await loadQRLib();
  if (!loaded) return '';
  try {
    const container = document.createElement('div');
    container.style.cssText = 'position:absolute;left:-9999px;top:-9999px';
    document.body.appendChild(container);
    new QRCode(container, {
      text, width: 128, height: 128,
      colorDark: '#000000', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
    await new Promise(r => setTimeout(r, 100)); // let QR render
    const canvas = container.querySelector('canvas');
    const img = container.querySelector('img');
    let dataURL = '';
    if (canvas) dataURL = canvas.toDataURL('image/png');
    else if (img) dataURL = img.src;
    container.remove();
    return dataURL;
  } catch(e) { return ''; }
}

// Build verification QR content — compact URL-style payload

  ].join(':');
}

// FEATURE 4: OFFLINE OR RESERVATION SYSTEM
// Reserves a block of OR numbers for offline use.
// Prevents duplicates when device goes offline.
// Each device gets a unique non-overlapping block.
// ════════════════════════════════════════════
const OR_BLOCK_SIZE = 50; // reserve 50 ORs at a time

async function reserveORBlock() {
  // Only works when Firebase + Cloud Functions are available
  if (!_fbFunctions || !isOnline) return null;
  try {
    const bir = getBIR();
    const fn = _fbFunctions.httpsCallable(_fbFunctions.functions, 'getNextORNumber');
    // Request a block by calling OR function OR_BLOCK_SIZE times would be wasteful
    // Instead call once to get current counter, then reserve the block
    const result = await fn({ prefix: bir.prefix, seriesTo: bir.serTo, blockSize: OR_BLOCK_SIZE });
    const blockStart = result.data.counter - OR_BLOCK_SIZE + 1;
    const blockEnd = result.data.counter;
    const block = { start: blockStart, end: blockEnd, current: blockStart, prefix: bir.prefix, reservedAt: new Date().toISOString() };
    saveSetting('or_reserved_block', JSON.stringify(block));
    logAct('OR Block Reserved', `Block ${bir.prefix}-${String(blockStart).padStart(7,'0')} to ${bir.prefix}-${String(blockEnd).padStart(7,'0')}`);
    toast(`✓ Reserved ${OR_BLOCK_SIZE} OR numbers for offline use`, 'emerald');
    return block;
  } catch(e) {
    console.warn('OR block reservation failed:', e);
    return null;
  }
}

function getReservedBlock() {
  try {
    const raw = getSetting('or_reserved_block', '');
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function useReservedOR() {
  const block = getReservedBlock();
  if (!block || block.current > block.end) return null; // block exhausted
  const orNum = block.prefix + '-' + String(block.current).padStart(7, '0');
  block.current++;
  saveSetting('or_reserved_block', JSON.stringify(block));
  // Log when block is running low
  const remaining = block.end - block.current + 1;
  if (remaining <= 5) toast(`⚠️ Offline OR block almost exhausted (${remaining} left). Go online to reserve more.`, 'rose', 7000);
  return orNum;
}

function clearReservedBlock() {
  saveSetting('or_reserved_block', '');
  toast('OR reservation block cleared', 'gold');
}

// Patch getORNumber to use reserved block when offline
const _origGetORNumber = getORNumber;
getORNumber = async function() {
  // If online — use cloud function (original)
  if (isOnline && _fbFunctions) return _origGetORNumber();
  // If offline — try reserved block first
  const reservedOR = useReservedOR();
  if (reservedOR) {
    console.log('Using reserved OR:', reservedOR);
    return reservedOR;
  }
  // If no block available — fall back to local counter + warn
  toast('⚠️ No OR block reserved. Using local counter. Sync when online to verify no duplicates.', 'rose', 8000);
  return getNextOR();
};

// Auto-reserve block when coming back online
window.addEventListener('online', async () => {
  const block = getReservedBlock();
  if (!block || block.current > block.end - 10) {
    // Block exhausted or almost — reserve a new one
    setTimeout(reserveORBlock, 2000);
  }
});

function renderORReservation(el) {
  const block = getReservedBlock();
  const bir = getBIR();
  const remaining = block ? block.end - block.current + 1 : 0;
  const statusColor = !block ? 'var(--rose)' : remaining <= 5 ? 'var(--rose)' : remaining <= 20 ? '#fbb923' : 'var(--emerald)';

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h4 style="margin:0">📶 Offline OR Reservation</h4>
      <span class="bir-badge">Multi-Device Safe</span>
    </div>
    <div class="card" style="border-left:3px solid ${statusColor}">
      <h5 style="color:${statusColor}">Current Block Status</h5>
      ${block
        ? `<div style="font-size:.82em;line-height:2">
            <div><span style="color:var(--text2)">Reserved Range:</span> <span style="font-family:var(--fm)">${bir.prefix}-${String(block.start).padStart(7,'0')} → ${bir.prefix}-${String(block.end).padStart(7,'0')}</span></div>
            <div><span style="color:var(--text2)">Next OR:</span> <span style="font-family:var(--fm)">${bir.prefix}-${String(block.current).padStart(7,'0')}</span></div>
            <div><span style="color:var(--text2)">Remaining:</span> <span style="color:${statusColor};font-weight:700">${remaining} of ${OR_BLOCK_SIZE}</span></div>
            <div><span style="color:var(--text2)">Reserved at:</span> ${new Date(block.reservedAt).toLocaleString('en-PH')}</div>
           </div>`
        : `<p style="font-size:.82em;color:var(--rose)">No OR block reserved. Device will use local counter when offline.</p>`
      }
    </div>
    <div class="card" style="border:1px solid rgba(111,163,239,.2)">
      <h5>How It Works</h5>
      <p style="font-size:.78em;color:var(--text2);line-height:1.7">When online, the system uses the Firebase Cloud Function for atomic OR numbers (no duplicates). When offline, it uses a pre-reserved block of ${OR_BLOCK_SIZE} ORs unique to this device. Reserve a block while online — it lasts until exhausted.</p>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
      <button class="btn bp" onclick="reserveORBlock().then(()=>sw('orReservation'))" ${!isOnline?'disabled':''}>
        📶 Reserve New Block ${!isOnline?'(Offline)':''}
      </button>
      <button class="btn bd" onclick="confirm2('Clear OR reservation block?','📶',true).then(ok=>{if(ok){clearReservedBlock();sw('orReservation');}})" ${!block?'disabled':''}>
        🗑 Clear Block
      </button>
    </div>
    <p style="font-size:.7em;color:var(--text3);text-align:center;margin-top:8px">Network: ${isOnline?'🟢 Online':'🔴 Offline'} · Firebase: ${_fbFunctions?'✓':'✗'}</p>`;
}

let _idb = null;
const IDB_NAME = 'mlea_pos_v6';
const IDB_VER = 2;

async function initIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      STORES.forEach(s => { if (!db.objectStoreNames.contains(s)) db.createObjectStore(s, { keyPath: 'id' }); });
    };
    req.onsuccess = e => { _idb = e.target.result; resolve(true); };
    req.onerror = e => { console.warn('IDB init failed:', e); resolve(false); };
  });
}

const IDB = {
  async getAll(store) {
    if (!_idb) return LocalDB.getAll(store);
    return new Promise(resolve => {
      const tx = _idb.transaction(store, 'readonly');
      const req = tx.objectStore(store).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => resolve(LocalDB.getAll(store));
    });
  },
  async set(store, items) {
    if (!_idb) { LocalDB.set(store, items); return; }
    return new Promise(resolve => {
      const tx = _idb.transaction(store, 'readwrite');
      const os = tx.objectStore(store);
      os.clear();
      items.forEach(item => os.put(item));
      tx.oncomplete = () => resolve();
      tx.onerror = () => { LocalDB.set(store, items); resolve(); };
    });
  },
  async add(store, item) {
    const items = await this.getAll(store);
    item.id = items.reduce((max, i) => Math.max(max, i.id || 0), 0) + 1;
    item.createdAt = new Date().toISOString();
    items.push(item);
    await this.set(store, items);
    // Keep localStorage in sync as fallback
    LocalDB.set(store, items);
    return item.id;
  },
  async update(store, item) {
    const items = await this.getAll(store);
    const idx = items.findIndex(i => i.id === item.id);
    if (idx !== -1) { item.updatedAt = new Date().toISOString(); items[idx] = item; await this.set(store, items); LocalDB.set(store, items); }
  },
  async delete(store, id) {
    const items = (await this.getAll(store)).filter(i => i.id !== id);
    await this.set(store, items); LocalDB.set(store, items);
  },
  getById(store, id) { return this.getAll(store).then(items => items.find(i => i.id === id) || null); },
  getByBranch(store, bid) { return this.getAll(store).then(items => items.filter(i => i.branchId === bid)); },
  // Migrate all localStorage data into IDB
  async migrateFromLocal() {
    let count = 0;
    for (const store of STORES) {
      const items = LocalDB.getAll(store);
      if (items.length) { await this.set(store, items); count += items.length; }
    }
    return count;
  }
};

// ════════════════════════════════════════════
// PHASE 3B: STORAGE QUOTA MONITOR
// ════════════════════════════════════════════
async function checkStorageQuota() {
  let used = 0, quota = 0, pct = 0;
  try {
    if (navigator.storage && navigator.storage.estimate) {
      const est = await navigator.storage.estimate();
      used = est.usage || 0; quota = est.quota || 1;
      pct = Math.round((used / quota) * 100);
    } else {
      // Fallback: measure localStorage
      const raw = JSON.stringify(localStorage).length;
      used = raw; quota = 5 * 1024 * 1024; // 5MB limit
      pct = Math.round((raw / quota) * 100);
    }
  } catch (e) { return null; }

  if (pct >= 90) {
    toast(`🚨 Storage critically full (${pct}%)! Export a backup immediately.`, 'rose', 10000);
  } else if (pct >= 70) {
    toast(`⚠️ Storage ${pct}% full. Consider downloading a backup.`, 'gold', 6000);
  }
  return { used, quota, pct };
}

function renderStorageQuota(containerId) {
  checkStorageQuota().then(info => {
    const el = document.getElementById(containerId);
    if (!el || !info) return;
    const { used, quota, pct } = info;
    const cls = pct >= 90 ? 'qcrit' : pct >= 70 ? 'qwarn' : 'qok';
    const usedMB = (used / 1024 / 1024).toFixed(2);
    const quotaMB = (quota / 1024 / 1024).toFixed(0);
    el.innerHTML = `
      <div style="display:flex;justify-content:space-between;font-size:.75em;margin-bottom:4px">
        <span style="color:var(--text2)">Storage Used</span>
        <span style="color:${pct >= 90 ? 'var(--rose)' : pct >= 70 ? '#fbb923' : 'var(--emerald)'}"><strong>${pct}%</strong> (${usedMB} MB of ${quotaMB} MB)</span>
      </div>
      <div class="quota-wrap"><div class="quota-bar ${cls}" style="width:${Math.min(pct,100)}%"></div></div>
      ${pct >= 70 ? `<p style="font-size:.72em;color:${pct>=90?'var(--rose)':'#fbb923'};margin-top:4px">${pct>=90?'🚨 Critical — export backup NOW':'⚠️ Getting full — download a backup soon'}</p>` : ''}`;
  });
}

// ════════════════════════════════════════════
// PHASE 3C: ERROR BOUNDARY
// ════════════════════════════════════════════
let _crashCartBackup = null;

window.addEventListener('error', e => {
  console.error('Global error:', e.error);
  // Save cart before anything else
  if (cart && cart.length) {
    try { localStorage.setItem('mlea_crash_cart', JSON.stringify(cart)); _crashCartBackup = cart; } catch {}
  }
  showErrorScreen(e.message || 'An unexpected error occurred', e.filename, e.lineno);
});

window.addEventListener('unhandledrejection', e => {
  console.error('Unhandled promise rejection:', e.reason);
  if (e.reason?.message?.includes('Firebase') || e.reason?.message?.includes('network')) {
    toast('Network error — working offline', 'gold');
    return; // Don't crash for Firebase/network errors
  }
  if (cart && cart.length) {
    try { localStorage.setItem('mlea_crash_cart', JSON.stringify(cart)); } catch {}
  }
});

function showErrorScreen(msg, file, line) {
  // Don't show for minor errors
  if (msg && (msg.includes('ResizeObserver') || msg.includes('Script error'))) return;
  const existing = document.getElementById('errScreen');
  if (existing) return;
  const div = document.createElement('div');
  div.id = 'errScreen'; div.className = 'err-screen';
  const hasCart = _crashCartBackup && _crashCartBackup.length > 0;
  div.innerHTML = `
    <div style="font-size:3em">⚠️</div>
    <h2>Something went wrong</h2>
    <p>${msg || 'An unexpected error occurred. Your data is safe.'}</p>
    ${hasCart ? `<div class="card" style="background:rgba(45,212,160,.08);border-color:rgba(45,212,160,.3);text-align:left;padding:12px 16px;max-width:300px">
      <p style="font-size:.78em;color:var(--emerald);font-weight:600;margin-bottom:6px">🛒 Your cart was saved</p>
      <p style="font-size:.75em;color:var(--text2)">${_crashCartBackup.length} items preserved. They will be restored when you reload.</p>
    </div>` : ''}
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn bs" onclick="location.reload()">🔄 Reload App</button>
      <button class="btn bw" onclick="downloadBackup();document.getElementById('errScreen').remove()">💾 Download Backup First</button>
      <button class="btn bd" onclick="document.getElementById('errScreen').remove()">Dismiss</button>
    </div>
    ${file ? `<p style="font-size:.65em;color:var(--text3);margin-top:8px">Error in ${file}:${line}</p>` : ''}`;
  document.body.appendChild(div);
}

// Restore crash cart on startup
function restoreCrashCart() {
  try {
    const saved = localStorage.getItem('mlea_crash_cart');
    if (saved) {
      const items = JSON.parse(saved);
      if (items && items.length) {
        cart = items;
        localStorage.removeItem('mlea_crash_cart');
        setTimeout(() => toast(`🛒 Restored ${items.length} cart items from before the crash`, 'gold', 5000), 2000);
      }
    }
  } catch {}
}
