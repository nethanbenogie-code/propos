<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MemoryOS</title>
  <meta name="description" content="A local-first personal memory operating system. Capture, recall, and act on everything — your data never leaves your device." />
  <meta name="theme-color" content="#4c4ed9" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="wordmark">Memory<b>OS</b></h1>
      <nav id="side-nav" aria-label="Views"></nav>
      <div class="capture-cta">
        <button id="capture-btn" class="btn btn-primary" type="button">
          + Capture &nbsp;<small>Ctrl K</small>
        </button>
        <button id="share-btn" class="btn btn-quiet share-cta" type="button">
          ♡ Share MemoryOS
        </button>
        <div id="side-links" class="side-links"></div>
      </div>
    </aside>

    <main>
      <div id="view-host"></div>
    </main>
  </div>

  <button id="fab" class="fab" type="button" aria-label="Quick capture">+</button>
  <nav id="tab-bar" class="tab-bar" aria-label="Views"></nav>

  <noscript>
    <p style="padding:24px;font-family:sans-serif">
      MemoryOS runs entirely on your device and needs JavaScript enabled.
    </p>
  </noscript>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
